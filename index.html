<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina Hipertrofia · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0e;--bg2:#161618;--bg3:#1e1e21;--bg4:#252529;
  --border:#2a2a2e;--border2:#353539;
  --text:#e8e6e0;--text2:#9a9896;--text3:#5a5856;
  --a-color:#e8744a;--b-color:#4a9de8;--c-color:#5ec47a;--d-color:#c45ee8;--e-color:#e8c44a;
  --a-dim:#2a1a12;--b-dim:#121e2a;--c-dim:#121e16;--d-dim:#1e122a;--e-dim:#2a250e;
  --accent:#c8f135;--warn:#ffa94d;--danger:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:340px;text-align:center;}
.login-logo{font-family:'Instrument Serif',serif;font-size:32px;margin-bottom:4px;}
.login-logo span{color:var(--accent);font-style:italic;}
.login-sub{font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;}
.login-box input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;text-align:center;letter-spacing:.08em;margin-bottom:12px;}
.login-box input:focus{outline:none;border-color:var(--accent);}
.login-btn{width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.login-btn:hover{background:#d5ff3a;}
.login-err{font-size:11px;color:var(--danger);margin-top:8px;min-height:16px;}


/* Quote */
.r-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.r-title{font-family:'Instrument Serif',serif;font-size:clamp(20px,4vw,34px);font-weight:400;line-height:1.1;margin-bottom:8px;}
.r-title em{font-style:italic;color:var(--a-color);}
.r-quote{font-size:12px;color:var(--text3);font-style:italic;line-height:1.5;min-height:18px;}

/* Colored group separators */
.group-header.grp-pecho .group-label{color:var(--a-color);}
.group-header.grp-pecho .group-line{background:color-mix(in srgb,var(--a-color) 30%,var(--border));}
.group-header.grp-triceps .group-label{color:#e8744a;}
.group-header.grp-triceps .group-line{background:color-mix(in srgb,#e8744a 25%,var(--border));}
.group-header.grp-espalda .group-label{color:var(--b-color);}
.group-header.grp-espalda .group-line{background:color-mix(in srgb,var(--b-color) 30%,var(--border));}
.group-header.grp-biceps .group-label{color:var(--b-color);}
.group-header.grp-biceps .group-line{background:color-mix(in srgb,var(--b-color) 25%,var(--border));}
.group-header.grp-gluteos .group-label{color:var(--c-color);}
.group-header.grp-gluteos .group-line{background:color-mix(in srgb,var(--c-color) 30%,var(--border));}
.group-header.grp-piernas .group-label{color:var(--c-color);}
.group-header.grp-piernas .group-line{background:color-mix(in srgb,var(--c-color) 25%,var(--border));}
.group-header.grp-hombros .group-label{color:var(--d-color);}
.group-header.grp-hombros .group-line{background:color-mix(in srgb,var(--d-color) 30%,var(--border));}
.group-header.grp-trapecio .group-label{color:var(--d-color);}
.group-header.grp-trapecio .group-line{background:color-mix(in srgb,var(--d-color) 25%,var(--border));}
.group-header.grp-core .group-label{color:#b8b05a;}
.group-header.grp-core .group-line{background:color-mix(in srgb,#b8b05a 30%,var(--border));}
.group-header.grp-pantorrillas .group-label{color:var(--e-color);}
.group-header.grp-pantorrillas .group-line{background:color-mix(in srgb,var(--e-color) 25%,var(--border));}
.group-header.grp-espalda-alta .group-label,.group-header.grp-espalda-alta-2 .group-label{color:var(--e-color);}
.group-header.grp-espalda-alta .group-line,.group-header.grp-espalda-alta-2 .group-line{background:color-mix(in srgb,var(--e-color) 25%,var(--border));}


/* Video embed */
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;background:var(--bg);}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:8px;}
.no-video{font-size:11px;color:var(--text3);font-style:italic;padding:12px 0;}

/* TOP NAV */
.top-nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.top-tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);transition:color .2s,border-color .2s;}
.top-tab:hover{color:var(--text2);}
.top-tab.active-routine{color:var(--a-color);border-bottom-color:var(--a-color);}
.top-tab.active-log{color:var(--accent);border-bottom-color:var(--accent);}
.view{display:none;}.view.active{display:block;}



/* WEEK BAR — 5 active days, non-scrollable day selector */


.wday:last-child{border-right:none;}



.wday.act-a .wday.act-a 
.wday.act-b .wday.act-b 
.wday.act-c .wday.act-c 
.wday.act-d .wday.act-d 
.wday.act-e .wday.act-e 

/* DAY INFO BAR — replaces scrollable tabs */
.day-info-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--bg2);}
.dib-btn{padding:12px 8px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;transition:all .15s;border-right:1px solid var(--border);min-height:64px;}
.dib-btn:last-child{border-right:none;}
.dib-day{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--text2);margin-bottom:3px;}
.dib-label{font-size:9px;color:var(--text2);line-height:1.3;letter-spacing:.03em;}
.dib-logic{font-size:9px;color:var(--text3);margin-top:2px;font-style:italic;opacity:.8;}
.dib-btn.sel-a{border-bottom-color:var(--a-color);background:var(--a-dim);}.dib-btn.sel-a .dib-day{color:var(--a-color);}
.dib-btn.sel-b{border-bottom-color:var(--b-color);background:var(--b-dim);}.dib-btn.sel-b .dib-day{color:var(--b-color);}
.dib-btn.sel-c{border-bottom-color:var(--c-color);background:var(--c-dim);}.dib-btn.sel-c .dib-day{color:var(--c-color);}
.dib-btn.sel-d{border-bottom-color:var(--d-color);background:var(--d-dim);}.dib-btn.sel-d .dib-day{color:var(--d-color);}
.dib-btn.sel-e{border-bottom-color:var(--e-color);background:var(--e-dim);}.dib-btn.sel-e .dib-day{color:var(--e-color);}
.dib-btn.sel-ov{border-bottom-color:var(--text3);}.dib-btn.sel-ov .dib-day{color:var(--text);}

/* Overview btn */
.dib-ov{grid-column:1/-1;border-right:none!important;border-bottom:1px solid var(--border);}

.panel{display:none;padding:16px 16px 80px;max-width:820px;}
.panel.active{display:block;}
.group-header{display:flex;align-items:center;gap:12px;margin:20px 0 10px;}
.group-header:first-child{margin-top:0;}
.group-line{flex:1;height:1px;background:var(--border);}
.group-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

/* Exercise card */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:border-color .2s;}
.ex-card.open{border-color:var(--accent-col);}
.ex-top{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;}
.ex-top:hover{background:rgba(255,255,255,.015);}
.ex-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.25;}
.ex-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.xtag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--border);}
.xtag-compound{background:#1a1e12;color:#8ab85a;border-color:#2a3018;}
.xtag-isolation{background:#12181e;color:#5a9ab8;border-color:#182030;}
.xtag-advanced{background:#1e1218;color:#b85a9a;border-color:#301828;}
.xtag-core{background:#1a1a12;color:#b8b05a;border-color:#303018;}
.xtag-preventive{background:#121e1e;color:#5ab8b0;border-color:#183030;}
.xtag-intensity{background:#1e1818;color:#b87a5a;border-color:#301e18;}
.ex-scheme-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.ex-primary{display:flex;flex-direction:column;gap:2px;min-width:90px;border-left:1px solid var(--border);padding-left:10px;}
.ex-primary-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.ex-primary-val{font-size:11px;font-weight:700;color:var(--accent-col);line-height:1.2;}
.ex-last{display:flex;flex-direction:column;gap:2px;min-width:80px;border-left:1px solid var(--border);padding-left:10px;}
.ex-last-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.ex-last-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);line-height:1.2;}
.ex-last-empty{font-size:11px;color:var(--text3);font-style:italic;}
.ex-arrow{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:4px;flex-shrink:0;}
.ex-card.open .ex-arrow{transform:rotate(180deg);}

/* Body */
.ex-body{display:none;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}
.ex-tracker-section{background:var(--bg3);}
.tracker-sub-tabs{display:flex;gap:2px;padding:8px 14px 0;border-bottom:1px solid var(--border);}
.tsub{padding:5px 12px;border-radius:5px 5px 0 0;font-size:10px;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .15s;}
.tsub.active{color:var(--accent-col);border-bottom-color:var(--accent-col);}
.tsub-content{display:none;padding:12px 14px;}
.tsub-content.active{display:block;}

/* Técnica */
.ex-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ex-block-label{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg);border:1px solid var(--border2);color:var(--text2);}
.chip.primary{background:color-mix(in srgb,var(--accent-col) 12%,var(--bg));border-color:color-mix(in srgb,var(--accent-col) 30%,var(--border2));color:var(--accent-col);font-weight:600;}
.ex-block-big{font-family:'DM Mono',monospace;font-size:17px;color:var(--text);}
.ex-tip{border-left:2px solid;padding:7px 11px;border-radius:0 6px 6px 0;background:var(--bg);font-size:12px;color:var(--text2);line-height:1.55;margin-top:8px;}

/* Mini chart */
.mini-chart-wrap{position:relative;height:90px;margin-bottom:8px;}
.mini-chart-wrap canvas{width:100%!important;height:90px!important;}
.no-data-msg{font-size:11px;color:var(--text3);font-style:italic;padding:8px 0;}

/* History table — full fields + edit */
.hist-table{width:100%;border-collapse:collapse;font-size:11px;}
.hist-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:4px 6px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.hist-table td{padding:6px 6px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;vertical-align:top;}
.hist-table td:first-child{font-family:'DM Sans',sans-serif;}
.hist-table tr:last-child td{border-bottom:none;}
.delta-pos{color:var(--accent);}.delta-neg{color:var(--danger);}.delta-same{color:var(--text3);}

/* Inline edit row */
.edit-row td{background:color-mix(in srgb,var(--accent) 5%,var(--bg3));padding:8px 6px;}
.edit-row input{background:var(--bg2);border:1px solid var(--accent);color:var(--text);border-radius:5px;padding:4px 7px;font-size:11px;font-family:'DM Mono',monospace;width:100%;outline:none;}
.edit-row input:focus{border-color:var(--accent);}
.edit-actions{display:flex;gap:4px;margin-top:4px;}

/* Add form */
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px;}
input,select{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 9px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
input:focus,select:focus{border-color:var(--accent);}
select option{background:var(--bg2);}
.form-actions{display:flex;gap:6px;margin-top:8px;grid-column:1/-1;}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Syne',sans-serif;letter-spacing:.04em;transition:all .15s;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{background:#d5ff3a;}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;border:none;}
.btn-edit{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-edit:hover{color:var(--text);}
.btn-save-edit{background:var(--accent);color:#000;}
.btn-cancel-edit{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-del{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-del:hover{background:var(--danger);color:#fff;}

/* Sep */
.sep{display:flex;align-items:center;gap:10px;margin:4px 0;}
.sep-line{flex:1;height:1px;background:var(--border);}
.sep span{font-size:9px;color:var(--text3);white-space:nowrap;letter-spacing:.08em;}

/* Overview */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.ov-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center;}
.ov-num{font-family:'Instrument Serif',serif;font-size:24px;color:var(--text);margin-bottom:2px;}
.ov-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.muscle-map{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.mm-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.mm-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.mm-days{display:flex;gap:5px;flex-wrap:wrap;}
.mm-day{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.principle{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.principle:last-child{border-bottom:none;}
.p-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.p-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.p-desc{font-size:11px;color:var(--text2);line-height:1.6;}
.ov-sec-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* LOG VIEW */
.log-wrap{max-width:860px;margin:0 auto;padding:16px 16px 80px;}
.log-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.log-title{font-family:'Instrument Serif',serif;font-size:22px;}.log-title span{color:var(--accent);font-style:italic;}
.l-stats{display:flex;gap:14px;}
.l-stat-val{font-family:'DM Mono',monospace;font-size:15px;color:var(--accent);}
.l-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-align:right;}
.log-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.filter-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-family:'Syne',sans-serif;transition:all .15s;}
.filter-btn.fall.active{background:var(--bg3);color:var(--text);border-color:var(--text3);}
.filter-btn.fa.active{background:var(--a-dim);color:var(--a-color);border-color:var(--a-color);}
.filter-btn.fb.active{background:var(--b-dim);color:var(--b-color);border-color:var(--b-color);}
.filter-btn.fc.active{background:var(--c-dim);color:var(--c-color);border-color:var(--c-color);}
.filter-btn.fd.active{background:var(--d-dim);color:var(--d-color);border-color:var(--d-color);}
.filter-btn.fe.active{background:var(--e-dim);color:var(--e-color);border-color:var(--e-color);}
.session-group{margin-bottom:14px;}
.session-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.session-date-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.day-badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
.badge-A{background:var(--a-dim);color:var(--a-color);border:1px solid #3a2218;}
.badge-B{background:var(--b-dim);color:var(--b-color);border:1px solid #182234;}
.badge-C{background:var(--c-dim);color:var(--c-color);border:1px solid #182418;}
.badge-D{background:var(--d-dim);color:var(--d-color);border:1px solid #281834;}
.badge-E{background:var(--e-dim);color:var(--e-color);border:1px solid #2a220a;}
.s-divider{flex:1;height:1px;background:var(--border);}
.log-row{display:grid;grid-template-columns:2fr 60px 60px 70px 80px 1fr auto;gap:5px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;margin-bottom:4px;font-size:11px;}
.lr-name{font-weight:600;font-size:12px;color:var(--text);}
.lr-muscle{font-size:9px;color:var(--text3);}
.lr-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--b-color);}
.lr-next{font-size:10px;color:var(--warn);}
.lr-note{font-size:10px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.empty-state span{display:block;font-size:28px;margin-bottom:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Workout<span>.</span>Log</div>
    <div class="login-sub">Acceso privado</div>
    <input type="password" id="pw-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-btn" onclick="checkPw()">Entrar</button>
    <div class="login-err" id="pw-err"></div>
  </div>
</div>

<!-- TOP NAV -->
<div class="top-nav">
  <button class="top-tab active-routine" onclick="switchView('routine',this)">🏋️ Rutina + Tracker</button>
  <button class="top-tab" onclick="switchView('log',this)">📋 Log completo</button>
</div>

<!-- ROUTINE VIEW -->
<div id="view-routine" class="view active">
  <div class="r-header">
    <div class="r-title">Rutina <em>completa</em> 5 días</div>
    <div class="r-quote" id="r-quote"></div>
  </div>

  <div class="day-info-bar" id="day-info-bar">
    <button class="dib-btn sel-a" id="dib-a" onclick="selectDay('a')">
      <div class="dib-day">DÍA A</div>
      <div class="dib-label">Pecho + Tríceps</div>
      <div class="dib-logic">Push horizontal</div>
    </button>
    <button class="dib-btn" id="dib-b" onclick="selectDay('b')">
      <div class="dib-day">DÍA B</div>
      <div class="dib-label">Espalda + Bíceps</div>
      <div class="dib-logic">Pull horizontal</div>
    </button>

function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2);}
function fmtDate(d){
  const[y,m,day]=d.split('-');
  const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dw=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return`${dw[new Date(+y,+m-1,+day).getDay()]}. ${+day} ${mo[+m-1]} ${y}`;
}
function parseKg(w){if(!w||/bw|body|same/i.test(w))return null;return parseFloat(w.replace(',','.'));}
function groupByDate(arr){const g={};arr.forEach(e=>{if(!g[e.date])g[e.date]=[];g[e.date].push(e);});return g;}
function getEntries(exName){return logData.filter(e=>e.exercise===exName).sort((a,b)=>a.date.localeCompare(b.date));}
function getLastEntry(exName){const e=getEntries(exName);return e.length?e[e.length-1]:null;}
function safeId(name){return name.replace(/[^a-z0-9]/gi,'_');}
function allExercises(){return[...new Set(logData.map(e=>e.exercise))].sort();}

function toggleCard(sid){
  const card=document.getElementById('card-'+sid);if(!card)return;
  const wasOpen=card.classList.contains('open');
  card.closest('.panel')?.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('open'));
  if(!wasOpen){
    card.classList.add('open');
    const cProg=card.querySelectorAll('.tsub-content')[1];
    const chartWrap=cProg?.querySelector('.mini-chart-wrap');
    const histWrap=cProg?.lastElementChild;
    // only render if prog tab is active
    const tabs=card.querySelectorAll('.tsub');
    if(tabs[1]?.classList.contains('active'))renderInlineProgress(sid,chartWrap,histWrap);
  }
}

function saveInlineEntry(card){
  const exName=card.dataset.exname;
  const primary=card.dataset.primary;
  const day=card.dataset.day;
  const form=card.querySelector('.add-form');
  if(!form){console.error('No form in card');return;}
  const get=f=>form.querySelector('[data-field="'+f+'"]');
  const date=get('date')?.value;
  if(!date){alert('Selecciona la fecha.');return;}
  const isBw=get('bw')?.checked;
  const series=get('series')?.value.trim()||'';
  const reps=get('reps')?.value.trim()||'';
  const sets=series&&reps?series+'x'+reps:series||reps;
  const weightRaw=get('weight')?.value.trim();
  const weight=isBw?'BW':(weightRaw?weightRaw+'kg':'');
  const entry={id:uid(),date,day,exercise:exName,primary,sets,weight,equipment:'Mancuernas',next:get('next')?.value.trim()||'',note:get('note')?.value.trim()||''};
  logData.push(entry);
  saveData();
  clearInlineForm(form);
  refreshCard(exName);
  const sid=safeId(exName);
  const cProg=card.querySelectorAll('.tsub-content')[1];
  const chartWrap=cProg?.querySelector('.mini-chart-wrap');
  const histWrap=cProg?.lastElementChild;
  renderInlineProgress(sid,chartWrap,histWrap);
  renderLog();
  // switch to Progresión
  const tabs=card.querySelectorAll('.tsub');
  const contents=card.querySelectorAll('.tsub-content');
  tabs.forEach(b=>b.classList.remove('active'));contents.forEach(c=>c.classList.remove('active'));
  if(tabs[1])tabs[1].classList.add('active');if(contents[1])contents[1].classList.add('active');
  renderInlineProgress(sid,chartWrap,histWrap);
}

function clearInlineForm(form){
  form.querySelectorAll('input').forEach(inp=>{
    if(inp.type==='date')inp.value=new Date().toISOString().split('T')[0];
    else if(inp.type==='checkbox'){inp.checked=false;inp.dispatchEvent(new Event('change'));}
    else inp.value='';
    inp.disabled=false;
  });
}

// INLINE PROGRESS with EDIT
// ══════════════════════════════════════════════════════
function renderInlineProgress(sid,chartWrap,histWrap){
  if(!chartWrap||!histWrap){
    const card=document.getElementById('card-'+sid);if(!card)return;
    const cProg=card.querySelectorAll('.tsub-content')[1];
    chartWrap=cProg?.querySelector('.mini-chart-wrap');
    histWrap=cProg?.lastElementChild;
  }
  const allEx=Object.values(DATA).flatMap(d=>d.groups.flatMap(g=>g.exercises));
  const exName=allEx.find(e=>safeId(e.name)===sid)?.name;
  if(!exName||!chartWrap||!histWrap)return;
  const entries=getEntries(exName);

  // Chart
  const wPoints=entries.map(e=>({date:fmtDate(e.date),val:parseKg(e.weight)})).filter(p=>p.val!==null);
  if(wPoints.length>=2){
    chartWrap.innerHTML='<canvas></canvas>';
    if(chartInstances[sid])chartInstances[sid].destroy();
    chartInstances[sid]=new Chart(chartWrap.querySelector('canvas').getContext('2d'),{
      type:'line',
      data:{labels:wPoints.map(p=>p.date),datasets:[{data:wPoints.map(p=>p.val),borderColor:'#c8f135',backgroundColor:'rgba(200,241,53,0.07)',pointBackgroundColor:'#c8f135',pointRadius:4,tension:0.35,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}},y:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}}}}
    });
  } else {
    chartWrap.innerHTML=`<div class="no-data-msg">${wPoints.length===1?'Solo 1 registro con peso — el gráfico aparece con 2 o más.':'Sin datos de peso todavía.'}</div>`;
  }

  // History table — full fields + edit button
  if(!entries.length){histWrap.innerHTML='<div class="no-data-msg">Ningún registro aún. ¡Usa ➕ Registrar!</div>';return;}

  const table=document.createElement('table');table.className='hist-table';
  const thead=document.createElement('thead');
  thead.innerHTML='<tr><th>Fecha</th><th>Series</th><th>Reps</th><th>Peso</th><th>Δ</th><th>Siguiente</th><th>Nota</th><th></th></tr>';
  table.appendChild(thead);
  const tbody=document.createElement('tbody');

  [...entries].reverse().forEach((e,i,arr)=>{
    const prev=arr[i+1];
    const ck=parseKg(e.weight),pk=prev?parseKg(prev.weight):null;
    let deltaHtml='';
    if(ck!==null&&pk!==null){const dv=ck-pk;deltaHtml=dv>0?`<span class="delta-pos">+${dv.toFixed(1)}</span>`:dv<0?`<span class="delta-neg">${dv.toFixed(1)}</span>`:`<span class="delta-same">—</span>`;}

    // Parse sets into series+reps
    const setsMatch=e.sets?.match(/^(\d+)[x×](.+)$/i);
    const dispSeries=setsMatch?setsMatch[1]:(e.sets||'');
    const dispReps=setsMatch?setsMatch[2]:'';

    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${fmtDate(e.date)}</td>
      <td>${dispSeries}</td>
      <td>${dispReps}</td>
      <td>${e.weight||'—'}</td>
      <td>${deltaHtml||'—'}</td>
      <td style="color:var(--warn)">${e.next||'—'}</td>
      <td style="color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.note||''}">${e.note||''}</td>
      <td style="white-space:nowrap">
        <button class="btn-xs btn-edit" style="margin-right:3px">✏️</button>
        <button class="btn-xs btn-del">✕</button>
      </td>`;

    // Edit button
    tr.querySelector('.btn-edit').addEventListener('click',()=>showEditRow(e,tr,sid,chartWrap,histWrap));
    // Delete button
    tr.querySelector('.btn-del').addEventListener('click',()=>{
      if(!confirm('¿Eliminar este registro?'))return;
      logData=logData.filter(x=>x.id!==e.id);
      saveData();renderLog();
      renderInlineProgress(sid,chartWrap,histWrap);
      refreshCard(exName);
    });
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  histWrap.innerHTML='';histWrap.appendChild(table);
}

function showEditRow(entry,origTr,sid,chartWrap,histWrap){
  // Remove any existing edit rows
  origTr.closest('tbody')?.querySelectorAll('.edit-row').forEach(r=>r.remove());

  const setsMatch=entry.sets?.match(/^(\d+)[x×](.+)$/i);
  const editSeries=setsMatch?setsMatch[1]:(entry.sets||'');
  const editReps=setsMatch?setsMatch[2]:'';

  const editTr=document.createElement('tr');editTr.className='edit-row';
  editTr.innerHTML=`<td colspan="8">
    <div style="display:grid;grid-template-columns:repeat(6,1fr) auto;gap:6px;align-items:end">

      <div><label>Series</label><input type="number" data-ef="series" value="${editSeries}" min="1" max="20"></div>
      <div><label>Reps</label><input type="text" data-ef="reps" value="${editReps}"></div>
      <div><label>Peso (kg)</label><input type="text" data-ef="weight" value="${entry.weight||''}"></div>
      <div><label>Siguiente</label><input type="text" data-ef="next" value="${entry.next||''}"></div>
      <div><label>Nota</label><input type="text" data-ef="note" value="${entry.note||''}"></div>
      <div style="display:flex;gap:4px;margin-bottom:1px">
        <button class="btn-xs btn-save-edit">✓ Guardar</button>
        <button class="btn-xs btn-cancel-edit">✕</button>
      </div>
    </div>
  </td>`;

  editTr.querySelector('.btn-save-edit').addEventListener('click',()=>{
    const get=f=>editTr.querySelector('[data-ef="'+f+'"]')?.value.trim();
    const series=get('series'),reps=get('reps');
    const idx=logData.findIndex(x=>x.id===entry.id);
    if(idx===-1)return;
    logData[idx]={...logData[idx],
      date:get('date')||entry.date,
      sets:series&&reps?series+'x'+reps:series||reps||entry.sets,
      weight:get('weight')||entry.weight,
      next:get('next'),note:get('note')
    };
    saveData();renderLog();
    renderInlineProgress(sid,chartWrap,histWrap);
    refreshCard(entry.exercise);
  });
  editTr.querySelector('.btn-cancel-edit').addEventListener('click',()=>editTr.remove());
  origTr.insertAdjacentElement('afterend',editTr);
  editTr.querySelector('[data-ef="series"]')?.focus();
}

function refreshCard(exName){
  const last=getLastEntry(exName);
  const sid=safeId(exName);
  const card=document.getElementById('card-'+sid);if(!card)return;
  const el=card.querySelector('.ex-last-val,.ex-last-empty');if(!el)return;
  if(last){el.className='ex-last-val';el.textContent=`${last.weight} · ${last.sets}`;}
  else{el.className='ex-last-empty';el.textContent='Sin datos';}
}

function refreshAllCards(){
  Object.values(DATA).forEach(d=>d.groups.forEach(g=>g.exercises.forEach(ex=>refreshCard(ex.name))));
}

function setDayFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('#day-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLog();
}
function setMuscleFilter(m,btn){
  activeMuscle=m;
  document.querySelectorAll('#muscle-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLog();
}

function renderLog(){
  const dates=[...new Set(logData.map(e=>e.date))];
  document.getElementById('l-sessions').textContent=dates.length;
  document.getElementById('l-total').textContent=logData.length;

  // Muscle filters
  const muscles=[...new Set(logData.map(e=>e.primary).filter(Boolean))].sort();
  const mf=document.getElementById('muscle-filters');
  mf.innerHTML='';
  function mkFBtn(label,val,active){
    const b=document.createElement('button');
    b.className='filter-btn fall'+(active?' active':'');
    b.textContent=label;
    b.addEventListener('click',()=>setMuscleFilter(val,b));
    mf.appendChild(b);
  }
  mkFBtn('Todos los músculos','ALL',activeMuscle==='ALL');
  muscles.forEach(m=>mkFBtn(m,m,m===activeMuscle));

  // Filter data
  let filtered=activeFilter==='ALL'?[...logData]:logData.filter(e=>e.day===activeFilter);
  if(activeMuscle!=='ALL') filtered=filtered.filter(e=>e.primary===activeMuscle);
  const groups=groupByDate(filtered);
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const container=document.getElementById('log-container');
  container.innerHTML='';

  if(!sorted.length){
    container.innerHTML='<div class="empty-state"><span>🏋️</span>Sin registros para este filtro.</div>';
    return;
  }

  sorted.forEach(date=>{
    const entries=groups[date];
    const dl=entries[0]?.day||'';

    const group=document.createElement('div');
    group.className='session-group';

    const hdr=document.createElement('div');hdr.className='session-hdr';
    hdr.innerHTML='<div class="session-date-lbl">'+fmtDate(date)+'</div><span class="day-badge badge-'+dl+'">DÍA '+dl+'</span><div class="s-divider"></div>';
    group.appendChild(hdr);

    entries.forEach(e=>{
      const sm=e.sets?.match(/^(\d+)[x×](.+)$/i);
      const row=document.createElement('div');row.className='log-row';

      const nameDiv=document.createElement('div');
      nameDiv.innerHTML='<div class="lr-name">'+e.exercise+'</div><div class="lr-muscle">'+(e.primary||'')+'</div>';

      const s1=document.createElement('div');s1.className='lr-mono';s1.textContent=sm?sm[1]:(e.sets||'—');
      const s2=document.createElement('div');s2.className='lr-mono';s2.textContent=sm?sm[2]:'—';
      const s3=document.createElement('div');s3.className='lr-mono';s3.textContent=e.weight||'—';
      const s4=document.createElement('div');s4.className='lr-next';s4.textContent='→ '+(e.next||'—');
      const s5=document.createElement('div');s5.className='lr-note';s5.title=e.note||'';s5.textContent=e.note||'';

      const btnWrap=document.createElement('div');btnWrap.style.cssText='display:flex;gap:3px;';
      const btnEdit=document.createElement('button');btnEdit.className='btn-xs btn-edit';btnEdit.textContent='✏️';
      const btnDel=document.createElement('button');btnDel.className='btn-xs btn-del';btnDel.textContent='✕';
      btnEdit.addEventListener('click',()=>editLogEntry(e.id,row));
      btnDel.addEventListener('click',()=>deleteLogEntry(e.id));
      btnWrap.append(btnEdit,btnDel);

      row.append(nameDiv,s1,s2,s3,s4,s5,btnWrap);
      group.appendChild(row);
    });
    container.appendChild(group);
  });
}


function deleteLogEntry(id){
  if(!confirm('¿Eliminar este registro?'))return;
  const entry=logData.find(e=>e.id===id);
  logData=logData.filter(e=>e.id!==id);saveData();renderLog();
  if(entry)refreshCard(entry.exercise);
}

function editLogEntry(id, row){
  document.querySelectorAll('.log-edit-panel').forEach(p=>p.remove());
  const entry=logData.find(e=>e.id===id);
  if(!entry)return;
  const sm=entry.sets?.match(/^(\d+)[x×](.+)$/i);
  const editSeries=sm?sm[1]:(entry.sets||'');
  const editReps=sm?sm[2]:'';

  const panel=document.createElement('div');
  panel.className='log-edit-panel';
  panel.style.cssText='background:color-mix(in srgb,var(--accent) 5%,var(--bg3));border:1px solid var(--accent);border-radius:7px;padding:10px 12px;margin-bottom:4px;display:grid;grid-template-columns:repeat(6,1fr) auto;gap:6px;align-items:end;';

  function mkEF(lbl,type,val,fieldName){
    const wrap=document.createElement('div');
    const l=document.createElement('label');l.textContent=lbl;
    const inp=document.createElement('input');
    inp.type=type;inp.value=val||'';inp.dataset.lef=fieldName;
    inp.style.cssText='background:var(--bg2);border:1px solid var(--accent);color:var(--text);border-radius:5px;padding:5px 7px;font-size:11px;width:100%;outline:none;font-family:DM Mono,monospace;';
    wrap.append(l,inp);return wrap;
  }
  const fDate=mkEF('Fecha','date',entry.date,'date');
  fDate.querySelector('input').type='date';
  const fSeries=mkEF('Series','number',editSeries,'series');
  const fReps=mkEF('Reps','text',editReps,'reps');
  const fWeight=mkEF('Peso','text',entry.weight||'','weight');
  const fNext=mkEF('Siguiente','text',entry.next||'','next');
  const fNote=mkEF('Nota','text',entry.note||'','note');

  const btnWrap=document.createElement('div');btnWrap.style.cssText='display:flex;gap:4px;margin-bottom:1px;';
  const btnSave=document.createElement('button');btnSave.className='btn-xs btn-save-edit';btnSave.textContent='✓';
  const btnCancel=document.createElement('button');btnCancel.className='btn-xs btn-cancel-edit';btnCancel.textContent='✕';
  btnSave.addEventListener('click',()=>{
    const get=f=>panel.querySelector('[data-lef="'+f+'"]')?.value.trim();
    const s=get('series'),r=get('reps');
    const idx=logData.findIndex(e=>e.id===id);
    if(idx===-1)return;
    logData[idx]={...logData[idx],date:get('date')||entry.date,sets:s&&r?s+'x'+r:s||r||entry.sets,weight:get('weight')||entry.weight,next:get('next'),note:get('note')};
    saveData();renderLog();refreshCard(logData[idx].exercise);
  });
  btnCancel.addEventListener('click',()=>panel.remove());
  btnWrap.append(btnSave,btnCancel);
  panel.append(fDate,fSeries,fReps,fWeight,fNext,fNote,btnWrap);
  row.insertAdjacentElement('afterend',panel);
  fSeries.querySelector('input').focus();
}
