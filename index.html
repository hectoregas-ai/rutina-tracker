<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina · Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0e; --bg2:#161618; --bg3:#1e1e21; --bg4:#252529;
  --border:#2a2a2e; --border2:#353539;
  --text:#e8e6e0; --text2:#9a9896; --text3:#5a5856;
  --ca:#e8744a; --cb:#4a9de8; --cc:#5ec47a; --cd:#c45ee8; --ce:#e8c44a;
  --da:#2a1a12; --db:#121e2a; --dc:#121e16; --dd:#1e122a; --de:#2a250e;
  --accent:#c8f135; --warn:#ffa94d; --danger:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* NAV */
.top-nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.tnav-btn{flex:1;padding:13px 8px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);transition:all .2s;}
.tnav-btn.on-r{color:var(--ca);border-bottom-color:var(--ca);}
.tnav-btn.on-l{color:var(--accent);border-bottom-color:var(--accent);}
.view{display:none;}.view.active{display:block;}

/* HEADER */
.r-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.r-title{font-family:'Instrument Serif',serif;font-size:clamp(20px,4vw,34px);font-weight:400;line-height:1.1;margin-bottom:6px;}
.r-title em{font-style:italic;color:var(--ca);}
.r-quote{font-size:12px;color:var(--text3);font-style:italic;line-height:1.5;}

/* OBJECTIVE BAR */
.obj-bar{display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;align-items:center;}
.obj-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-right:4px;}
.obj-btn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-family:'Syne',sans-serif;transition:all .18s;}
.obj-btn.ah{background:#1a2e12;color:#8ab85a;border-color:#3a5a1a;}
.obj-btn.as{background:#1a1a2e;color:#6d9de8;border-color:#1a2a5a;}
.obj-btn.ad{background:#2e1a12;color:#e8a44a;border-color:#5a2a0a;}
.obj-btn.ar{background:#121e1e;color:#5ab8b0;border-color:#0a3a38;}

/* DAY BAR */
.day-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--bg2);}
.day-btn{padding:11px 6px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;transition:all .15s;border-right:1px solid var(--border);}
.day-btn:last-child{border-right:none;}
.day-btn-day{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--text2);margin-bottom:3px;}
.day-btn-label{font-size:9px;color:var(--text2);line-height:1.3;letter-spacing:.02em;}
.day-btn-logic{font-size:9px;color:var(--text3);margin-top:2px;font-style:italic;}
.day-btn.sa{border-bottom-color:var(--ca);background:var(--da);}.day-btn.sa .day-btn-day{color:var(--ca);}
.day-btn.sb{border-bottom-color:var(--cb);background:var(--db);}.day-btn.sb .day-btn-day{color:var(--cb);}
.day-btn.sc{border-bottom-color:var(--cc);background:var(--dc);}.day-btn.sc .day-btn-day{color:var(--cc);}
.day-btn.sd{border-bottom-color:var(--cd);background:var(--dd);}.day-btn.sd .day-btn-day{color:var(--cd);}
.day-btn.se{border-bottom-color:var(--ce);background:var(--de);}.day-btn.se .day-btn-day{color:var(--ce);}

/* PANEL */
.panel{display:none;padding:14px 14px 80px;max-width:820px;}
.panel.active{display:block;}
.grp-hdr{display:flex;align-items:center;gap:10px;margin:18px 0 8px;}
.grp-hdr:first-child{margin-top:0;}
.grp-line{flex:1;height:1px;}
.grp-lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;font-weight:700;}

/* EX CARD */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:border-color .2s;}
.ex-card.open{border-color:var(--day-color);}
.ex-top{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;}
.ex-top:hover{background:rgba(255,255,255,.012);}
.ex-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:34px;background:var(--day-color);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.25;}
.ex-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.xtag{font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--border);}
.xtc{background:#1a1e12;color:#8ab85a;border-color:#2a3018;}
.xti{background:#12181e;color:#5a9ab8;border-color:#182030;}
.xta{background:#1e1218;color:#b85a9a;border-color:#301828;}
.xtk{background:#1a1a12;color:#b8b05a;border-color:#303018;}
.xtp{background:#121e1e;color:#5ab8b0;border-color:#183030;}
.xtint{background:#1e1818;color:#b87a5a;border-color:#301e18;}
.ex-scheme{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:2px;}
.ex-primary{display:flex;flex-direction:column;gap:2px;min-width:88px;border-left:1px solid var(--border);padding-left:9px;}
.ex-plbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.ex-pval{font-size:11px;font-weight:700;color:var(--day-color);line-height:1.2;}
.ex-intensity{display:flex;flex-direction:column;gap:3px;border-left:1px solid var(--border);padding-left:9px;min-width:68px;}
.w-badge{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;white-space:nowrap;display:inline-block;}
.wh{background:#2a1212;color:#e87a7a;border:1px solid #4a2020;}
.wm{background:#2a2012;color:#e8c44a;border:1px solid #4a3a10;}
.wl{background:#122a12;color:#7ae87a;border:1px solid #1a4a1a;}
.ex-rest-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.ex-last{display:flex;flex-direction:column;gap:2px;border-left:1px solid var(--border);padding-left:9px;min-width:78px;}
.ex-llbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.ex-lval{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.ex-lempty{font-size:11px;color:var(--text3);font-style:italic;}
.ex-arrow{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:3px;flex-shrink:0;}
.ex-card.open .ex-arrow{transform:rotate(180deg);}

/* EX BODY */
.ex-body{display:none;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}
.ex-inner{background:var(--bg3);}
.sub-tabs{display:flex;gap:2px;padding:7px 12px 0;border-bottom:1px solid var(--border);}
.stab{padding:5px 11px;border-radius:5px 5px 0 0;font-size:10px;font-weight:600;letter-spacing:.05em;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--day-color);border-bottom-color:var(--day-color);}
.stab-content{display:none;padding:12px 13px;}
.stab-content.on{display:block;}

/* TECHNIQUE */
.tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.blk-lbl{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg);border:1px solid var(--border2);color:var(--text2);}
.chip.p{background:color-mix(in srgb,var(--day-color) 12%,var(--bg));border-color:color-mix(in srgb,var(--day-color) 30%,var(--border2));color:var(--day-color);font-weight:600;}
.blk-big{font-family:'DM Mono',monospace;font-size:14px;color:var(--text);}
.ex-how p{font-size:12px;color:var(--text2);line-height:1.65;margin-top:5px;}
.ex-tip{border-left:2px solid var(--day-color);padding:7px 11px;border-radius:0 6px 6px 0;background:var(--bg);font-size:12px;color:var(--text2);line-height:1.55;margin-top:8px;}

/* PROGRESS */
.mini-chart{height:140px;margin-bottom:8px;}
.mini-chart canvas{width:100%!important;height:140px!important;}
.no-data{font-size:11px;color:var(--text3);font-style:italic;padding:8px 0;}
.hist-table{width:100%;border-collapse:collapse;font-size:11px;}
.hist-table th{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:4px 5px;border-bottom:1px solid var(--border);text-align:left;}
.hist-table td{padding:6px 5px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;}
.hist-table td:first-child{font-family:'DM Sans',sans-serif;}
.hist-table tr:last-child td{border-bottom:none;}
.dp{color:var(--accent);} .dn{color:var(--danger);} .ds{color:var(--text3);}

/* EDIT ROW */
.edit-row{background:color-mix(in srgb,var(--accent) 5%,var(--bg3));}
.edit-row td{padding:7px 5px;}
.edit-inputs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr auto;gap:5px;align-items:end;}
.ei input{width:100%;background:var(--bg2);border:1px solid var(--accent);color:var(--text);border-radius:5px;padding:4px 6px;font-size:11px;font-family:'DM Mono',monospace;outline:none;}

/* ADD FORM */
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.add-form label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px;}
.add-form input{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 9px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.add-form input:focus{border-color:var(--accent);}
.full{grid-column:1/-1;}
.bw-row{display:flex;align-items:flex-end;gap:8px;}
.bw-row input[type=checkbox]{width:16px;height:16px;margin-bottom:9px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.bw-row label{font-size:11px;text-transform:none;letter-spacing:0;color:var(--text2);cursor:pointer;margin-bottom:8px;}

/* VIDEO */
.vid-btn{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:10px;padding:14px 16px;text-decoration:none;transition:background .15s;margin-bottom:8px;}
.vid-btn:hover{background:var(--bg3);}
.vid-play{width:44px;height:44px;background:red;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vid-info-title{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
.vid-info-ex{font-size:11px;color:var(--text2);margin-top:2px;}
.vid-channel{font-size:10px;margin-top:4px;padding:2px 8px;border-radius:4px;display:inline-block;}
.vid-arrow{margin-left:auto;font-size:18px;}
.vid-hint{font-size:10px;color:var(--text3);font-style:italic;text-align:center;padding:4px 0;}
.no-video{font-size:11px;color:var(--text3);font-style:italic;padding:12px 0;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Syne',sans-serif;transition:all .15s;}
.btn-a{background:var(--accent);color:#000;}.btn-a:hover{background:#d5ff3a;}
.btn-g{background:transparent;color:var(--text3);border:1px solid var(--border2);}.btn-g:hover{color:var(--text);}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;border:none;}
.btn-edit{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.btn-save{background:var(--accent);color:#000;}
.btn-cancel{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-del{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-del:hover{background:var(--danger);color:#fff;}
.form-actions{display:flex;gap:6px;margin-top:8px;}

/* SEP */
.sep{display:flex;align-items:center;gap:8px;margin:4px 0;}
.sep-line{flex:1;height:1px;background:var(--border);}
.sep span{font-size:9px;color:var(--text3);white-space:nowrap;letter-spacing:.07em;}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.ov-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center;}
.ov-num{font-family:'Instrument Serif',serif;font-size:24px;color:var(--text);margin-bottom:2px;}
.ov-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.mm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.mm-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.mm-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.mm-days{display:flex;gap:5px;flex-wrap:wrap;}
.mm-day{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.principle{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.principle:last-child{border-bottom:none;}
.p-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.p-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.p-desc{font-size:11px;color:var(--text2);line-height:1.6;}
.ov-sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin:18px 0 9px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* LOG VIEW */
.log-wrap{max-width:860px;margin:0 auto;padding:14px 14px 80px;}
.log-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.log-title{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;}
.log-title span{color:var(--accent);font-style:italic;}
.l-stats{display:flex;gap:14px;}
.l-sval{font-family:'DM Mono',monospace;font-size:15px;color:var(--accent);}
.l-slbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-align:right;}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.filt{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-family:'Syne',sans-serif;transition:all .15s;}
.filt:hover{color:var(--text);}
.filt.on{background:var(--bg3);color:var(--text);border-color:var(--text3);}
.filt.fa.on{background:var(--da);color:var(--ca);border-color:var(--ca);}
.filt.fb.on{background:var(--db);color:var(--cb);border-color:var(--cb);}
.filt.fc.on{background:var(--dc);color:var(--cc);border-color:var(--cc);}
.filt.fd.on{background:var(--dd);color:var(--cd);border-color:var(--cd);}
.filt.fe.on{background:var(--de);color:var(--ce);border-color:var(--ce);}
.sess-grp{margin-bottom:14px;}
.sess-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sess-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.d-badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
.bA{background:var(--da);color:var(--ca);border:1px solid #3a2218;}
.bB{background:var(--db);color:var(--cb);border:1px solid #182234;}
.bC{background:var(--dc);color:var(--cc);border:1px solid #182418;}
.bD{background:var(--dd);color:var(--cd);border:1px solid #281834;}
.bE{background:var(--de);color:var(--ce);border:1px solid #2a220a;}
.sdiv{flex:1;height:1px;background:var(--border);}
.log-row{display:grid;grid-template-columns:2fr 58px 58px 68px 78px 1fr auto;gap:5px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;margin-bottom:4px;font-size:11px;}
.lr-name{font-weight:600;font-size:12px;}
.lr-muscle{font-size:9px;color:var(--text3);}
.lr-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--cb);}
.lr-next{font-size:10px;color:var(--warn);}
.lr-note{font-size:10px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-edit-panel{background:color-mix(in srgb,var(--accent) 5%,var(--bg3));border:1px solid var(--accent);border-radius:7px;padding:9px 10px;margin-bottom:4px;display:grid;grid-template-columns:repeat(6,1fr) auto;gap:5px;align-items:end;}
.log-edit-panel label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px;}
.log-edit-panel input{width:100%;background:var(--bg2);border:1px solid var(--accent);color:var(--text);border-radius:5px;padding:5px 6px;font-size:11px;font-family:'DM Mono',monospace;outline:none;}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.empty-state span{display:block;font-size:28px;margin-bottom:8px;}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .top-nav { overflow-x: auto; }
  .tnav-btn { font-size: 10px; padding: 12px 6px; letter-spacing: .06em; }
  .r-hdr { padding: 14px 14px 10px; }
  .r-title { font-size: 22px; }
  .obj-bar { padding: 10px 14px; gap: 5px; }
  .obj-btn { font-size: 10px; padding: 4px 10px; }
  .obj-lbl { display: none; }
  .day-bar { grid-template-columns: repeat(5,1fr); }
  .day-btn { padding: 8px 3px; }
  .day-btn-day { font-size: 10px; }
  .day-btn-label { font-size: 8px; }
  .day-btn-logic { display: none; }
  .panel { padding: 10px 10px 80px; }
  .ex-top { gap: 6px; padding: 9px 10px; flex-wrap: wrap; }
  .ex-primary { display: none; }
  .ex-intensity { min-width: 58px; padding-left: 7px; }
  .ex-last { min-width: 68px; padding-left: 7px; }
  .ex-name { font-size: 12px; }
  .sub-tabs { overflow-x: auto; padding: 6px 10px 0; gap: 1px; }
  .stab { font-size: 9px; padding: 4px 9px; white-space: nowrap; }
  .stab-content { padding: 10px 10px; }
  .tech-grid { grid-template-columns: 1fr; gap: 8px; }
  .add-form { grid-template-columns: 1fr 1fr; gap: 7px; }
  .log-wrap { padding: 10px 10px 80px; }
  .log-row { grid-template-columns: 2fr 60px 60px 70px; gap: 4px; }
  .lr-next,.lr-note { display: none; }
  .log-hdr { flex-direction: column; gap: 8px; align-items: flex-start; }
  .l-stats { gap: 12px; }
  .filters { gap: 4px; }
  .filt { font-size: 9px; padding: 3px 8px; }
  .log-edit-panel { grid-template-columns: 1fr 1fr 1fr; }
  .hist-table { font-size: 10px; }
  .hist-table th, .hist-table td { padding: 4px 4px; }
  .edit-inputs { grid-template-columns: 1fr 1fr 1fr; }
  .grp-lbl { font-size: 9px; }
  .ex-how p { font-size: 11px; }
  .ex-tip { font-size: 11px; }
}

</style>
</head>
<body>

<div class="top-nav">
  <button class="tnav-btn on-r" onclick="switchView('routine',this)">🏋️ Rutina + Tracker</button>
  <button class="tnav-btn" onclick="switchView('log',this)">📋 Log completo</button>
</div>

<!-- ROUTINE VIEW -->
<div id="view-routine" class="view active">
  <div class="r-hdr">
    <div class="r-title">Rutina <em>completa</em> 5 días</div>
    <div class="r-quote" id="r-quote"></div>
  </div>
  <div class="obj-bar">
    <span class="obj-lbl">Objetivo</span>
    <button class="obj-btn ah" onclick="setObj('h',this)">💪 Hipertrofia</button>
    <button class="obj-btn" onclick="setObj('s',this)">🏋️ Fuerza</button>
    <button class="obj-btn" onclick="setObj('d',this)">🔥 Definición</button>
    <button class="obj-btn" onclick="setObj('r',this)">🫀 Resistencia</button>
  </div>
  <div class="day-bar">
    <button class="day-btn sa" id="dbn-a" onclick="selDay('a',this)">

function loadData(){
  try { const r=localStorage.getItem(SK); logData=r?JSON.parse(r):[...SEED]; if(!r)save(); }
  catch(e){ logData=[...SEED]; }
  renderLog(); refreshAllCards();
}
function save(){ try{ localStorage.setItem(SK,JSON.stringify(logData)); }catch(e){} }
function uid(){ return 'e'+Date.now()+Math.random().toString(36).slice(2); }

function fmtDate(d){
  const [y,m,day]=d.split('-');
  const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dw=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return dw[new Date(+y,+m-1,+day).getDay()]+'. '+day+' '+mo[+m-1]+' '+y;
}
function parseKg(w){ if(!w||/bw|body|same/i.test(w))return null; return parseFloat(w.replace(',','.')); }
function groupByDate(arr){ const g={}; arr.forEach(e=>{ if(!g[e.date])g[e.date]=[]; g[e.date].push(e); }); return g; }
function getEntries(name){ return logData.filter(e=>e.exercise===name).sort((a,b)=>a.date.localeCompare(b.date)); }
function getLastEntry(name){ const e=getEntries(name); return e.length?e[e.length-1]:null; }

function buildDay(key){
  const panel = document.getElementById('panel-'+key);
  const day = DAYS[key];
  panel.style.setProperty('--day-color', day.color);

  day.groups.forEach(group => {
    const gh = document.createElement('div');
    gh.className = 'grp-hdr';
    gh.innerHTML = `<div class="grp-line" style="background:color-mix(in srgb,${group.color} 30%,var(--border))"></div><div class="grp-lbl" style="color:${group.color}">${group.label}</div><div class="grp-line" style="background:color-mix(in srgb,${group.color} 30%,var(--border))"></div>`;
    panel.appendChild(gh);

    group.exercises.forEach((ex, i) => {
      panel.appendChild(buildCard(ex, day.color, key));
      if(i < group.exercises.length-1){
        const sep = document.createElement('div');
        sep.className = 'sep';
        const p = OBJ[curObj][ex.w==='h'?'H':ex.w==='m'?'M':'L'];
        sep.innerHTML = `<div class="sep-line"></div><span>${p.rest} descanso</span><div class="sep-line"></div>`;
        sep.dataset.exname = ex.name;
        panel.appendChild(sep);
      }
    });
  });
}

function buildCard(ex, color, dayKey){
  const card = document.createElement('div');
  card.className = 'ex-card';
  card.id = 'card-'+sid(ex.name);
  card.dataset.exname = ex.name;
  card.dataset.primary = ex.primary;
  card.dataset.day = dayKey.toUpperCase();

  card.style.setProperty('--day-color', color);

  const p = OBJ[curObj][ex.w==='h'?'H':ex.w==='m'?'M':'L'];
  const last = getLastEntry(ex.name);
  const chips = ex.muscles.map(m=>`<span class="chip${m===ex.primary?' p':''}">${m}</span>`).join('');
  const wIcon = ex.w==='h'?'🔴':ex.w==='m'?'🟡':'🟢';
  const wLbl = ex.w==='h'?'Alto':ex.w==='m'?'Medio':'Bajo';
  const wCls = ex.w==='h'?'wh':ex.w==='m'?'wm':'wl';

  // TOP
  const top = document.createElement('div');
  top.className = 'ex-top';
  top.innerHTML = `
    <div class="ex-stripe"></div>
    <div class="ex-info">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">
        <span class="xtag ${TAG[ex.type]||'xtc'}">${TAG_LBL[ex.type]||ex.type}</span>
        <span class="ex-scheme" data-scheme>${p.sc}</span>
      </div>
    </div>
    <div class="ex-primary"><div class="ex-plbl">Principal</div><div class="ex-pval">${ex.primary}</div></div>
    <div class="ex-intensity">
      <span class="w-badge ${wCls}" data-wbadge>${wIcon} ${wLbl}</span>
      <span class="ex-rest-lbl" data-rest>${p.rest}</span>
    </div>
    <div class="ex-last">
      <div class="ex-llbl">Última sesión</div>
      <div class="${last?'ex-lval':'ex-lempty'}" data-lastval>${last?`${last.weight} · ${last.sets}`:'Sin datos'}</div>
    </div>
    <div class="ex-arrow">▼</div>`;
  top.addEventListener('click', () => toggleCard(sid(ex.name)));

  // BODY
  const body = document.createElement('div');
  body.className = 'ex-body';
  const inner = document.createElement('div');
  inner.className = 'ex-inner';

  // Sub-tabs
  const tabBar = document.createElement('div');
  tabBar.className = 'sub-tabs';
  const tTech = mkTab('Técnica', true, color);
  const tProg = mkTab('Progresión', false, color);
  const tVid = mkTab('📹 Video', false, color);
  const tAdd = mkTab('➕ Registrar', false, color);
  tabBar.append(tTech, tProg, tVid, tAdd);

  // Técnica
  const cTech = document.createElement('div');
  cTech.className = 'stab-content on';
  cTech.innerHTML = `
    <div class="tech-grid">
      <div><div class="blk-lbl">Músculos</div><div class="chips">${chips}</div></div>
      <div><div class="blk-lbl">Series · Reps · Descanso</div><div class="blk-big" data-body-scheme>${p.sc} · ${p.rest} descanso</div></div>
    </div>
    <div class="ex-how"><div class="blk-lbl">Ejecución</div><p>${ex.how}</p></div>
    <div class="ex-tip">💡 ${ex.tip}</div>`;

  // Progresión
  const cProg = document.createElement('div');
  cProg.className = 'stab-content';
  const chartDiv = document.createElement('div');
  chartDiv.className = 'mini-chart';
  const histDiv = document.createElement('div');
  cProg.append(chartDiv, histDiv);

  // Video
  const cVid = document.createElement('div');
  cVid.className = 'stab-content';
  if(ex.vid){
    const cc = CH_COLOR[ex.vid.ch]||'var(--accent)';
    const a = document.createElement('a');
    a.href = 'https://www.youtube.com/watch?v='+ex.vid.id;
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.className = 'vid-btn';
    a.style.border = '1px solid '+cc;
    a.innerHTML = `<div class="vid-play"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div><div><div class="vid-info-title" style="color:${cc}">Ver en YouTube</div><div class="vid-info-ex">${ex.name}</div><div class="vid-channel" style="background:${cc}22;color:${cc}">${ex.vid.ch}</div></div><div class="vid-arrow" style="color:${cc}">↗</div>`;
    const hint = document.createElement('div');
    hint.className = 'vid-hint';
    hint.textContent = 'Se abre en nueva pestaña';

      [tTech,tProg,tVid,tAdd].forEach(b=>b.classList.remove('on'));
      [cTech,cProg,cVid,cAdd].forEach(c=>c.classList.remove('on'));
      btn.classList.add('on'); content.classList.add('on');
      if(content===cProg) renderProg(sid(ex.name), chartDiv, histDiv);

  inner.append(tabBar, cTech, cProg, cVid, cAdd);
  body.appendChild(inner);
  card.append(top, body);
  return card;
}

function mkTab(label, active, color){
  const btn = document.createElement('button');
  btn.className = 'stab'+(active?' on':'');
  btn.textContent = label;
  btn.style.setProperty('--day-color', color);
  return btn;
}

function buildForm(ex){
  const form = document.createElement('div');
  form.className = 'add-form';
  const sm = ex.name.match(/(\d+)\s*[×x]\s*([\d–\-]+)/);

  function mkF(lbl,type,ph,field){
    const w=document.createElement('div');
    const l=document.createElement('label');l.textContent=lbl;
    const inp=document.createElement('input');inp.type=type;inp.placeholder=ph;inp.dataset.field=field;
    if(type==='date')inp.value=new Date().toISOString().split('T')[0];
    w.append(l,inp);return w;
  }

  const fDate=mkF('Fecha','date','','date');
  const fSer=mkF('Series','number',sm?sm[1]:'4','series');fSer.querySelector('input').min=1;fSer.querySelector('input').max=10;
  const fReps=mkF('Reps realizadas','text',sm?sm[2]:'8','reps');
  const fWt=mkF('Peso (kg)','number','0','weight');fWt.querySelector('input').step=0.5;fWt.querySelector('input').min=0;
  // Show kg hint
  const kgHint=document.createElement('div');kgHint.style.cssText='font-size:9px;color:var(--text3);margin-top:2px;font-family:DM Mono,monospace;';kgHint.textContent='Escribe solo el número — se añade kg automáticamente';fWt.appendChild(kgHint);

  const fBw=document.createElement('div');fBw.className='bw-row';
  const cbw=document.createElement('input');cbw.type='checkbox';cbw.dataset.field='bw';
  const lbw=document.createElement('label');lbw.textContent='Peso corporal';
  cbw.addEventListener('change',()=>{const wi=form.querySelector('[data-field="weight"]');if(wi){wi.disabled=cbw.checked;if(cbw.checked)wi.value='';}});
  fBw.append(cbw,lbw);

  const fNext=mkF('Siguiente','text','same / +2.5','next');
  const fNote=mkF('Nota','text','Sensaciones...','note');fNote.classList.add('full');

  const actions=document.createElement('div');actions.className='form-actions full';
  const bSave=document.createElement('button');bSave.className='btn btn-a';bSave.textContent='Guardar';
  const bClr=document.createElement('button');bClr.className='btn btn-g';bClr.textContent='Limpiar';
  bSave.addEventListener('click',()=>saveEntry(bSave.closest('.ex-card')));
  bClr.addEventListener('click',()=>clearForm(form));
  actions.append(bSave,bClr);

  form.append(fDate,fWt,fBw,fSer,fReps,fNext,fNote,actions);
  return form;
}

function sid(name){ return name.replace(/[^a-z0-9]/gi,'_'); }

function toggleCard(s){
  const card=document.getElementById('card-'+s);if(!card)return;
  const wasOpen=card.classList.contains('open');
  card.closest('.panel')?.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('open'));
  if(!wasOpen) card.classList.add('open');
}

function saveEntry(card){
  const exName=card.dataset.exname, primary=card.dataset.primary, day=card.dataset.day;
  const form=card.querySelector('.add-form');if(!form)return;
  const get=f=>form.querySelector('[data-field="'+f+'"]');
  const date=get('date')?.value;if(!date){alert('Selecciona la fecha.');return;}
  const isBw=get('bw')?.checked;
  const ser=get('series')?.value.trim(), reps=get('reps')?.value.trim();
  const sets=ser&&reps?ser+'x'+reps:ser||reps;
  const wRaw=get('weight')?.value.trim();
  const weight=isBw?'BW':(wRaw?((/kg|bw|body/i.test(wRaw))?wRaw:wRaw+'kg'):'');
  const entry={id:uid(),date,day,exercise:exName,primary,sets,weight,equipment:'Mancuernas',next:get('next')?.value.trim()||'',note:get('note')?.value.trim()||''};
  logData.push(entry);
  save();clearForm(form);
  refreshCard(exName);renderLog();
  // switch to Progresión
  const tabs=card.querySelectorAll('.stab'), contents=card.querySelectorAll('.stab-content');
  tabs.forEach(b=>b.classList.remove('on'));contents.forEach(c=>c.classList.remove('on'));
  if(tabs[1])tabs[1].classList.add('on');
  if(contents[1])contents[1].classList.add('on');
  const cProg=contents[1];
  if(cProg){
    const chartDiv=cProg.querySelector('.mini-chart'), histDiv=cProg.lastElementChild;
    renderProg(sid(exName),chartDiv,histDiv);
  }
}

function clearForm(form){
  form.querySelectorAll('input').forEach(inp=>{
    if(inp.type==='date')inp.value=new Date().toISOString().split('T')[0];
    else if(inp.type==='checkbox'){inp.checked=false;inp.dispatchEvent(new Event('change'));}
    else inp.value='';
    inp.disabled=false;
  });
}

function refreshCard(exName){
  const last=getLastEntry(exName);
  const card=document.getElementById('card-'+sid(exName));if(!card)return;
  const el=card.querySelector('[data-lastval]');if(!el)return;
  if(last){el.className='ex-lval';el.textContent=last.weight+' · '+last.sets;}
  else{el.className='ex-lempty';el.textContent='Sin datos';}
}

function refreshAllCards(){
  Object.values(DAYS).forEach(d=>d.groups.forEach(g=>g.exercises.forEach(ex=>refreshCard(ex.name))));
}

// ═══════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════
function renderProg(s, chartDiv, histDiv){
  const allEx=Object.values(DAYS).flatMap(d=>d.groups.flatMap(g=>g.exercises));
  const ex=allEx.find(e=>sid(e.name)===s);if(!ex)return;
  const entries=getEntries(ex.name);
  const wpts=entries.map(e=>({date:fmtDate(e.date),val:parseKg(e.weight)})).filter(p=>p.val!==null);

  // Chart
  chartDiv.innerHTML='';
  if(wpts.length>=2){
    const canvas=document.createElement('canvas');chartDiv.appendChild(canvas);
    if(charts[s])charts[s].destroy();
    charts[s]=new Chart(canvas.getContext('2d'),{
      type:'line',
      data:{labels:wpts.map(p=>p.date),datasets:[{data:wpts.map(p=>p.val),borderColor:'#c8f135',backgroundColor:'rgba(200,241,53,0.07)',pointBackgroundColor:'#c8f135',pointRadius:4,tension:0.35,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}},y:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}}}}
    });
  } else {
    chartDiv.innerHTML='<div class="no-data">'+(wpts.length===1?'Un registro con peso — el gráfico aparece con 2 o más.':'Sin datos de peso todavía.')+'</div>';
  }

  // Table
  if(!entries.length){histDiv.innerHTML='<div class="no-data">Ningún registro aún. ¡Usa ➕ Registrar!</div>';return;}
  const tbl=document.createElement('table');tbl.className='hist-table';
  const thead=document.createElement('thead');
  thead.innerHTML='<tr><th>Fecha</th><th>Peso</th><th>Series</th><th>Reps</th><th>Δ</th><th>Siguiente</th><th>Nota</th><th></th></tr>';
  tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  [...entries].reverse().forEach((e,i,arr)=>{
    const prev=arr[i+1];
    const ck=parseKg(e.weight),pk=prev?parseKg(prev.weight):null;
    let delta='';
    if(ck!==null&&pk!==null){const dv=ck-pk;delta=dv>0?`<span class="dp">+${dv.toFixed(1)}</span>`:dv<0?`<span class="dn">${dv.toFixed(1)}</span>`:`<span class="ds">—</span>`;}
    const sm=e.sets?.match(/^(\d+)[x×](.+)$/i);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${fmtDate(e.date)}</td><td>${e.weight||'—'}</td><td>${sm?sm[1]:(e.sets||'')}</td><td>${sm?sm[2]:''}</td><td>${delta||'—'}</td><td style="color:var(--warn)">${e.next||'—'}</td><td style="color:var(--text3);font-family:'DM Sans',sans-serif;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note||''}</td><td style="white-space:nowrap"><button class="btn-xs btn-edit" style="margin-right:3px">✏️</button><button class="btn-xs btn-del">✕</button></td>`;
    tr.querySelector('.btn-edit').addEventListener('click',()=>showEditRow(e,tr,s,chartDiv,histDiv));
    tr.querySelector('.btn-del').addEventListener('click',()=>{
      if(!confirm('¿Eliminar?'))return;
      logData=logData.filter(x=>x.id!==e.id);save();renderLog();renderProg(s,chartDiv,histDiv);refreshCard(ex.name);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);histDiv.innerHTML='';histDiv.appendChild(tbl);
}

function showEditRow(entry,origTr,s,chartDiv,histDiv){
  origTr.closest('tbody')?.querySelectorAll('.edit-row').forEach(r=>r.remove());
  const sm=entry.sets?.match(/^(\d+)[x×](.+)$/i);
  const eSer=sm?sm[1]:(entry.sets||''), eReps=sm?sm[2]:'';
  const editTr=document.createElement('tr');editTr.className='edit-row';
  const td=document.createElement('td');td.colSpan=8;
  const grid=document.createElement('div');grid.className='edit-inputs';

  function mkEI(lbl,type,val,f){
    const w=document.createElement('div');w.className='ei';
    const l=document.createElement('label');l.textContent=lbl;
    const inp=document.createElement('input');inp.type=type;inp.value=val||'';inp.dataset.ef=f;
    w.append(l,inp);return w;
  }
  const fDate=mkEI('Fecha','date',entry.date,'date');
  const fSer=mkEI('Series','number',eSer,'series');
  const fReps=mkEI('Reps','text',eReps,'reps');
  const fWt=mkEI('Peso','text',entry.weight||'','weight');
  const fNext=mkEI('Siguiente','text',entry.next||'','next');
  const fNote=mkEI('Nota','text',entry.note||'','note');

  const btns=document.createElement('div');btns.style.cssText='display:flex;gap:4px;align-items:flex-end;padding-bottom:1px;';
  const bSave=document.createElement('button');bSave.className='btn-xs btn-save';bSave.textContent='✓';
  const bCancel=document.createElement('button');bCancel.className='btn-xs btn-cancel';bCancel.textContent='✕';
  bSave.addEventListener('click',()=>{
    const get=f=>editTr.querySelector('[data-ef="'+f+'"]')?.value.trim();
    const s2=get('series'),r=get('reps');
    const idx=logData.findIndex(x=>x.id===entry.id);if(idx===-1)return;
    logData[idx]={...logData[idx],date:get('date')||entry.date,sets:s2&&r?s2+'x'+r:s2||r||entry.sets,weight:get('weight')||entry.weight,next:get('next'),note:get('note')};
    save();renderLog();renderProg(s,chartDiv,histDiv);refreshCard(logData[idx].exercise);
  });
  bCancel.addEventListener('click',()=>editTr.remove());
  btns.append(bSave,bCancel);
  grid.append(fDate,fWt,fSer,fReps,fNext,fNote,btns);
  td.appendChild(grid);editTr.appendChild(td);
  origTr.insertAdjacentElement('afterend',editTr);
  fSer.querySelector('input').focus();
}

function setDayF(f,btn){ dayFilter=f; document.querySelectorAll('#day-filters .filt').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderLog(); }
function setMuscF(f,btn){ muscFilter=f; document.querySelectorAll('#muscle-filters .filt').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderLog(); }

function renderLog(){
  const dates=[...new Set(logData.map(e=>e.date))];
  document.getElementById('l-sess').textContent=dates.length;
  document.getElementById('l-total').textContent=logData.length;

  const muscles=[...new Set(logData.map(e=>e.primary).filter(Boolean))].sort();
  const mf=document.getElementById('muscle-filters');mf.innerHTML='';
  function mBtn(lbl,val){const b=document.createElement('button');b.className='filt'+(val===muscFilter?' on':'');b.textContent=lbl;b.addEventListener('click',()=>setMuscF(val,b));mf.appendChild(b);}
  mBtn('Todos los músculos','ALL');muscles.forEach(m=>mBtn(m,m));

  let filtered=dayFilter==='ALL'?[...logData]:logData.filter(e=>e.day===dayFilter);
  if(muscFilter!=='ALL')filtered=filtered.filter(e=>e.primary===muscFilter);
  const groups=groupByDate(filtered);
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const container=document.getElementById('log-container');container.innerHTML='';

  if(!sorted.length){container.innerHTML='<div class="empty-state"><span>🏋️</span>Sin registros para este filtro.</div>';return;}

  sorted.forEach(date=>{
    const entries=groups[date], dl=entries[0]?.day||'';
    const grp=document.createElement('div');grp.className='sess-grp';
    const hdr=document.createElement('div');hdr.className='sess-hdr';
    hdr.innerHTML=`<div class="sess-date">${fmtDate(date)}</div><span class="d-badge b${dl}">DÍA ${dl}</span><div class="sdiv"></div>`;
    grp.appendChild(hdr);
    entries.forEach(e=>{
      const sm=e.sets?.match(/^(\d+)[x×](.+)$/i);
      const row=document.createElement('div');row.className='log-row';
      const nd=document.createElement('div');nd.innerHTML=`<div class="lr-name">${e.exercise}</div><div class="lr-muscle">${e.primary||''}</div>`;
      const s1=document.createElement('div');s1.className='lr-mono';s1.textContent=e.weight||'—';
      const s2=document.createElement('div');s2.className='lr-mono';s2.textContent=sm?sm[1]:(e.sets||'—');
      const s3=document.createElement('div');s3.className='lr-mono';s3.textContent=sm?sm[2]:'—';
      const s4=document.createElement('div');s4.className='lr-next';s4.textContent='→ '+(e.next||'—');
      const s5=document.createElement('div');s5.className='lr-note';s5.title=e.note||'';s5.textContent=e.note||'';
      const bw=document.createElement('div');bw.style.cssText='display:flex;gap:3px;';
      const be=document.createElement('button');be.className='btn-xs btn-edit';be.textContent='✏️';
      const bd=document.createElement('button');bd.className='btn-xs btn-del';bd.textContent='✕';
      be.addEventListener('click',()=>editLogEntry(e.id,row));
      bd.addEventListener('click',()=>deleteLogEntry(e.id));
      bw.append(be,bd);row.append(nd,s1,s2,s3,s4,s5,bw);grp.appendChild(row);
    });
    container.appendChild(grp);
  });
}

function editLogEntry(id,row){
  document.querySelectorAll('.log-edit-panel').forEach(p=>p.remove());
  const entry=logData.find(e=>e.id===id);if(!entry)return;
  const sm=entry.sets?.match(/^(\d+)[x×](.+)$/i);
  const eSer=sm?sm[1]:(entry.sets||''), eReps=sm?sm[2]:'';
  const panel=document.createElement('div');panel.className='log-edit-panel';

  function mkLF(lbl,type,val,f){
    const w=document.createElement('div');
    const l=document.createElement('label');l.textContent=lbl;
    const inp=document.createElement('input');inp.type=type;inp.value=val||'';inp.dataset.lef=f;
    w.append(l,inp);return w;
  }
  const fDate=mkLF('Fecha','date',entry.date,'date');
  const fSer=mkLF('Series','number',eSer,'series');
  const fReps=mkLF('Reps','text',eReps,'reps');
  const fWt=mkLF('Peso','text',entry.weight||'','weight');
  const fNext=mkLF('Siguiente','text',entry.next||'','next');
  const fNote=mkLF('Nota','text',entry.note||'','note');
  const btns=document.createElement('div');btns.style.cssText='display:flex;gap:4px;align-items:flex-end;';
  const bS=document.createElement('button');bS.className='btn-xs btn-save';bS.textContent='✓';
  const bC=document.createElement('button');bC.className='btn-xs btn-cancel';bC.textContent='✕';
  bS.addEventListener('click',()=>{
    const get=f=>panel.querySelector('[data-lef="'+f+'"]')?.value.trim();
    const s=get('series'),r=get('reps');
    const idx=logData.findIndex(e=>e.id===id);if(idx===-1)return;
    logData[idx]={...logData[idx],date:get('date')||entry.date,sets:s&&r?s+'x'+r:s||r||entry.sets,weight:get('weight')||entry.weight,next:get('next'),note:get('note')};
    save();renderLog();refreshCard(logData[idx].exercise);
  });
  bC.addEventListener('click',()=>panel.remove());
  btns.append(bS,bC);panel.append(fDate,fSer,fReps,fWt,fNext,fNote,btns);
  row.insertAdjacentElement('afterend',panel);
  fSer.querySelector('input').focus();
}

function deleteLogEntry(id){
  if(!confirm('¿Eliminar este registro?'))return;
  const entry=logData.find(e=>e.id===id);
  logData=logData.filter(e=>e.id!==id);save();renderLog();
  if(entry)refreshCard(entry.exercise);
}

function switchView(view,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tnav-btn').forEach(b=>b.classList.remove('on-r','on-l'));
  document.getElementById('view-'+view).classList.add('active');
  btn.classList.add(view==='routine'?'on-r':'on-l');
}

const DAY_SEL = {a:'sa',b:'sb',c:'sc',d:'sd',e:'se'};
function selDay(key,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('sa','sb','sc','sd','se'));
  document.getElementById('panel-'+key).classList.add('active');
  if(btn) btn.classList.add(DAY_SEL[key]);
}
