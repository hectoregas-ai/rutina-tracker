<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina Hipertrofia · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0e;--bg2:#161618;--bg3:#1e1e21;--bg4:#252529;
  --border:#2a2a2e;--border2:#353539;
  --text:#e8e6e0;--text2:#9a9896;--text3:#5a5856;
  --a-color:#e8744a;--b-color:#4a9de8;--c-color:#5ec47a;--d-color:#c45ee8;
  --a-dim:#2a1a12;--b-dim:#121e2a;--c-dim:#121e16;--d-dim:#1e122a;
  --accent:#c8f135;--warn:#ffa94d;--danger:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* TOP NAV */
.top-nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.top-tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);transition:color .2s,border-color .2s;}
.top-tab:hover{color:var(--text2);}
.top-tab.active-routine{color:var(--a-color);border-bottom-color:var(--a-color);}
.top-tab.active-log{color:var(--accent);border-bottom-color:var(--accent);}
.view{display:none;}.view.active{display:block;}

/* ══ ROUTINE ══ */
.r-header{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
.r-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.r-title{font-family:'Instrument Serif',serif;font-size:clamp(22px,4vw,36px);font-weight:400;line-height:1.1;margin-bottom:4px;}
.r-title em{font-style:italic;color:var(--a-color);}
.r-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.hpill{font-size:9px;letter-spacing:.08em;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);text-transform:uppercase;}

.week-bar{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.wday{padding:9px 4px;text-align:center;cursor:pointer;border-right:1px solid var(--border);transition:background .15s;}
.wday:last-child{border-right:none;}
.wday-name{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.wday-badge{font-size:11px;font-weight:700;color:var(--text2);}
.wday-dot{width:4px;height:4px;border-radius:50%;margin:3px auto 0;background:var(--border2);}
.wday.active-a{background:var(--a-dim);}.wday.active-a .wday-badge{color:var(--a-color);}.wday.active-a .wday-dot{background:var(--a-color);}
.wday.active-b{background:var(--b-dim);}.wday.active-b .wday-badge{color:var(--b-color);}.wday.active-b .wday-dot{background:var(--b-color);}
.wday.active-c{background:var(--c-dim);}.wday.active-c .wday-badge{color:var(--c-color);}.wday.active-c .wday-dot{background:var(--c-color);}
.wday.active-d{background:var(--d-dim);}.wday.active-d .wday-badge{color:var(--d-color);}.wday.active-d .wday-dot{background:var(--d-color);}

.day-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--bg2);}
.day-tabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:0 16px;height:46px;display:flex;align-items:center;gap:8px;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);transition:color .2s,border-color .2s;}
.dtab:hover{color:var(--text2);}
.dtab-dot{width:7px;height:7px;border-radius:50%;}
.dtab.sel-a{color:var(--a-color);border-bottom-color:var(--a-color);}
.dtab.sel-b{color:var(--b-color);border-bottom-color:var(--b-color);}
.dtab.sel-c{color:var(--c-color);border-bottom-color:var(--c-color);}
.dtab.sel-d{color:var(--d-color);border-bottom-color:var(--d-color);}
.dtab.sel-overview{color:var(--text);border-bottom-color:var(--text3);}

.panel{display:none;padding:16px 16px 60px;max-width:820px;}
.panel.active{display:block;}
.group-header{display:flex;align-items:center;gap:12px;margin:20px 0 10px;}
.group-header:first-child{margin-top:0;}
.group-line{flex:1;height:1px;background:var(--border);}
.group-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

/* Exercise card */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:border-color .2s;}
.ex-card.open{border-color:var(--accent-col);}
.ex-top{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;}
.ex-top:hover{background:rgba(255,255,255,.015);}
.ex-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.25;}
.ex-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.xtag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid var(--border);}
.xtag-compound{background:#1a1e12;color:#8ab85a;border-color:#2a3018;}
.xtag-isolation{background:#12181e;color:#5a9ab8;border-color:#182030;}
.xtag-advanced{background:#1e1218;color:#b85a9a;border-color:#301828;}
.xtag-core{background:#1a1a12;color:#b8b05a;border-color:#303018;}
.xtag-preventive{background:#121e1e;color:#5ab8b0;border-color:#183030;}
.xtag-intensity{background:#1e1818;color:#b87a5a;border-color:#301e18;}
.ex-scheme-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}

/* Primary muscle — always visible */
.ex-primary{display:flex;flex-direction:column;gap:2px;min-width:90px;border-left:1px solid var(--border);padding-left:10px;}
.ex-primary-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.ex-primary-val{font-size:11px;font-weight:700;color:var(--accent-col);line-height:1.2;}

/* Last-session pill — always visible if data exists */
.ex-last{display:flex;flex-direction:column;gap:2px;min-width:70px;border-left:1px solid var(--border);padding-left:10px;}
.ex-last-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.ex-last-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);line-height:1.2;}
.ex-last-empty{font-size:11px;color:var(--text3);font-style:italic;}

.ex-arrow{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:4px;flex-shrink:0;}
.ex-card.open .ex-arrow{transform:rotate(180deg);}

/* Expanded body — 3 sections */
.ex-body{display:none;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}

/* Section: technique */
.ex-section{padding:12px 14px 12px 17px;border-bottom:1px solid var(--border);}
.ex-section:last-child{border-bottom:none;}
.ex-section-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ex-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.ex-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ex-block-label{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.chip.primary{background:color-mix(in srgb,var(--accent-col) 12%,var(--bg3));border-color:color-mix(in srgb,var(--accent-col) 30%,var(--border2));color:var(--accent-col);font-weight:600;}
.ex-block-big{font-family:'DM Mono',monospace;font-size:17px;color:var(--text);}
.ex-how{margin-bottom:8px;}
.ex-tip{border-left:2px solid;padding:7px 11px;border-radius:0 6px 6px 0;background:var(--bg3);font-size:12px;color:var(--text2);line-height:1.55;}

/* Section: tracker — inline chart + history */
.ex-tracker-section{background:var(--bg3);}
.tracker-sub-tabs{display:flex;gap:2px;padding:8px 14px 0;border-bottom:1px solid var(--border);}
.tsub{padding:5px 12px;border-radius:5px 5px 0 0;font-size:10px;font-weight:600;letter-spacing:.06em;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;border-bottom:2px solid transparent;transition:all .15s;}
.tsub.active{color:var(--accent-col);border-bottom-color:var(--accent-col);}
.tsub-content{display:none;padding:12px 14px;}
.tsub-content.active{display:block;}

/* Mini chart inside card */
.mini-chart-wrap{position:relative;height:80px;margin-bottom:8px;}
.mini-chart-wrap canvas{width:100%!important;height:80px!important;}
.no-data-msg{font-size:11px;color:var(--text3);font-style:italic;padding:10px 0;}

/* History table inside card */
.hist-table{width:100%;border-collapse:collapse;font-size:11px;}
.hist-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:4px 6px;border-bottom:1px solid var(--border);text-align:left;}
.hist-table td{padding:6px 6px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;}
.hist-table td:first-child{font-family:'DM Sans',sans-serif;font-size:11px;}
.hist-table tr:last-child td{border-bottom:none;}
.delta-pos{color:var(--accent);}.delta-neg{color:var(--danger);}.delta-same{color:var(--text3);}

/* Add entry form inside card */
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.add-form-full{grid-column:1/-1;}
label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px;}
input,select,textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 9px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
input:focus,select:focus{border-color:var(--accent);}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Syne',sans-serif;letter-spacing:.04em;transition:all .15s;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{background:#d5ff3a;}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);}
.btn-danger-sm{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-family:'Syne',sans-serif;}
.btn-danger-sm:hover{background:var(--danger);color:#fff;}
.form-actions{display:flex;gap:6px;margin-top:8px;grid-column:1/-1;}

/* sep */
.sep{display:flex;align-items:center;gap:10px;margin:4px 0;}
.sep-line{flex:1;height:1px;background:var(--border);}
.sep span{font-size:9px;color:var(--text3);white-space:nowrap;letter-spacing:.08em;}

/* Overview */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.ov-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center;}
.ov-num{font-family:'Instrument Serif',serif;font-size:24px;color:var(--text);margin-bottom:2px;}
.ov-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.muscle-map{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.mm-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.mm-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.mm-days{display:flex;gap:5px;flex-wrap:wrap;}
.mm-day{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.principle{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.principle:last-child{border-bottom:none;}
.p-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.p-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.p-desc{font-size:11px;color:var(--text2);line-height:1.6;}
.ov-sec-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* ══ LOG VIEW ══ */
.log-wrap{max-width:860px;margin:0 auto;padding:16px 16px 60px;}
.log-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.log-title{font-family:'Instrument Serif',serif;font-size:24px;}.log-title span{color:var(--accent);font-style:italic;}
.l-stats{display:flex;gap:16px;}
.l-stat-val{font-family:'DM Mono',monospace;font-size:16px;color:var(--accent);}
.l-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-align:right;}
.log-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.filter-btn{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-family:'Syne',sans-serif;transition:all .15s;}
.filter-btn:hover{color:var(--text);}
.filter-btn.fa.active{background:var(--a-dim);color:var(--a-color);border-color:var(--a-color);}
.filter-btn.fb.active{background:var(--b-dim);color:var(--b-color);border-color:var(--b-color);}
.filter-btn.fc.active{background:var(--c-dim);color:var(--c-color);border-color:var(--c-color);}
.filter-btn.fd.active{background:var(--d-dim);color:var(--d-color);border-color:var(--d-color);}
.filter-btn.fall.active{background:var(--bg3);color:var(--text);border-color:var(--text3);}
.session-group{margin-bottom:14px;}
.session-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.session-date-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.day-badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
.badge-A{background:var(--a-dim);color:var(--a-color);border:1px solid #3a2218;}
.badge-B{background:var(--b-dim);color:var(--b-color);border:1px solid #182234;}
.badge-C{background:var(--c-dim);color:var(--c-color);border:1px solid #182418;}
.badge-D{background:var(--d-dim);color:var(--d-color);border:1px solid #281834;}
.s-divider{flex:1;height:1px;background:var(--border);}
.log-row{display:grid;grid-template-columns:2fr 68px 80px 88px 1fr auto;gap:6px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:4px;font-size:11px;}
.lr-name{font-weight:600;font-size:12px;color:var(--text);}
.lr-muscle{font-size:9px;color:var(--text3);}
.lr-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--b-color);}
.lr-next{font-size:10px;color:var(--warn);}
.lr-note{font-size:10px;color:var(--text3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.empty-state span{display:block;font-size:28px;margin-bottom:8px;}
</style>
</head>
<body>

<div class="top-nav">
  <button class="top-tab active-routine" onclick="switchView('routine',this)">🏋️ Rutina + Tracker</button>
  <button class="top-tab" onclick="switchView('log',this)">📋 Log completo</button>
</div>

<!-- ════ ROUTINE VIEW ════ -->
<div id="view-routine" class="view active">
  <div class="r-header">
    <div class="r-eyebrow">Programa de hipertrofia · Mancuernas en casa</div>
    <div class="r-title">Rutina <em>completa</em> 4 días</div>
    <div class="r-pills">
      <span class="hpill">Cuerpo completo</span><span class="hpill">Solo mancuernas</span>
      <span class="hpill">4 × semana</span><span class="hpill">45–60 min</span><span class="hpill">Hipertrofia</span>
    </div>
  </div>
  <div class="week-bar">
    <div class="wday active-a" onclick="selectDayTab('a')"><div class="wday-name">Lun</div><div class="wday-badge">A</div><div class="wday-dot"></div></div>
    <div class="wday active-b" onclick="selectDayTab('b')"><div class="wday-name">Mar</div><div class="wday-badge">B</div><div class="wday-dot"></div></div>
    <div class="wday"><div class="wday-name">Mié</div><div class="wday-badge" style="color:var(--text3)">—</div><div class="wday-dot"></div></div>
    <div class="wday active-c" onclick="selectDayTab('c')"><div class="wday-name">Jue</div><div class="wday-badge">C</div><div class="wday-dot"></div></div>
    <div class="wday active-d" onclick="selectDayTab('d')"><div class="wday-name">Vie</div><div class="wday-badge">D</div><div class="wday-dot"></div></div>
    <div class="wday"><div class="wday-name">Sáb</div><div class="wday-badge" style="color:var(--text3)">—</div><div class="wday-dot"></div></div>
    <div class="wday"><div class="wday-name">Dom</div><div class="wday-badge" style="color:var(--text3)">—</div><div class="wday-dot"></div></div>
  </div>
  <div class="day-tabs">
    <button class="dtab sel-a" id="dtab-a" onclick="showDay('a',this)"><span class="dtab-dot" style="background:var(--a-color)"></span>Día A · Espalda + Bíceps</button>
    <button class="dtab" id="dtab-b" onclick="showDay('b',this)"><span class="dtab-dot" style="background:var(--b-color)"></span>Día B · Pecho + Tríceps + Hombros</button>
    <button class="dtab" id="dtab-c" onclick="showDay('c',this)"><span class="dtab-dot" style="background:var(--c-color)"></span>Día C · Glúteos + Piernas</button>
    <button class="dtab" id="dtab-d" onclick="showDay('d',this)"><span class="dtab-dot" style="background:var(--d-color)"></span>Día D · Hombros + Brazos + Core</button>
    <button class="dtab" id="dtab-ov" onclick="showDay('ov',this)">Visión general</button>
  </div>
  <div id="panel-a" class="panel active"></div>
  <div id="panel-b" class="panel"></div>
  <div id="panel-c" class="panel"></div>
  <div id="panel-d" class="panel"></div>
  <div id="panel-ov" class="panel"></div>
</div>

<!-- ════ LOG VIEW ════ -->
<div id="view-log" class="view">
  <div class="log-wrap">
    <div class="log-header">
      <div class="log-title">Log <span>completo</span></div>
      <div class="l-stats">
        <div><div class="l-stat-val" id="l-sessions">0</div><div class="l-stat-lbl">Sesiones</div></div>
        <div><div class="l-stat-val" id="l-total">0</div><div class="l-stat-lbl">Registros</div></div>
      </div>
    </div>
    <div class="log-filters" id="day-filters">
      <button class="filter-btn fall active" onclick="setDayFilter('ALL',this)">Todos</button>
      <button class="filter-btn fa" onclick="setDayFilter('A',this)">Día A</button>
      <button class="filter-btn fb" onclick="setDayFilter('B',this)">Día B</button>
      <button class="filter-btn fc" onclick="setDayFilter('C',this)">Día C</button>
      <button class="filter-btn fd" onclick="setDayFilter('D',this)">Día D</button>
    </div>
    <div class="log-filters" id="muscle-filters" style="margin-top:-2px"></div>
    <div id="log-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ════════════════════════════════════════
// ROUTINE DATA
// ════════════════════════════════════════
const DATA = {
  a:{color:'#e8744a',selClass:'sel-a',groups:[

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    logData=raw?JSON.parse(raw):[...SEED_DATA];
    if(!raw){saveData();}
  } catch(e){logData=[...SEED_DATA];}
  renderLog();
  refreshAllCards();
}
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(logData));}
  catch(e){console.error('localStorage error',e);}
}

function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2);}
function fmtDate(d){
  const[y,m,day]=d.split('-');
  const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dw=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return`${dw[new Date(+y,+m-1,+day).getDay()]}. ${+day} ${mo[+m-1]} ${y}`;
}
function parseKg(w){if(!w||/body|same/i.test(w))return null;return parseFloat(w.replace(',','.'));}
function groupByDate(arr){const g={};arr.forEach(e=>{if(!g[e.date])g[e.date]=[];g[e.date].push(e);});return g;}

function getEntries(exName){return logData.filter(e=>e.exercise===exName).sort((a,b)=>a.date.localeCompare(b.date));}
function getLastEntry(exName){const e=getEntries(exName);return e.length?e[e.length-1]:null;}

function buildDay(key){
  const panel=document.getElementById('panel-'+key);
  const d=DATA[key];
  panel.style.setProperty('--accent-col',d.color);
  d.groups.forEach(group=>{
    const gh=document.createElement('div');gh.className='group-header';
    gh.innerHTML=`<div class="group-line"></div><div class="group-label">${group.label}</div><div class="group-line"></div>`;
    panel.appendChild(gh);
    group.exercises.forEach((ex,i)=>{
      panel.appendChild(makeExCard(ex,d,key));
      if(i<group.exercises.length-1){
        const sep=document.createElement('div');sep.className='sep';
        sep.innerHTML=`<div class="sep-line"></div><span>${ex.rest} descanso</span><div class="sep-line"></div>`;
        panel.appendChild(sep);
      }
    });
  });
}

function makeExCard(ex,d,dayKey){
  const card=document.createElement('div');
  card.className='ex-card';
  card.id='card-'+safeId(ex.name);
  card.dataset.exname=ex.name;
  card.dataset.primary=ex.primary;
  card.dataset.day=dayKey.toUpperCase();
  card.style.setProperty('--accent-col',d.color);

  const chips=ex.muscles.map(m=>`<span class="chip${m===ex.primary?' primary':''}">${m}</span>`).join('');
  const tagCls=TAG_CLASS[ex.type]||'';
  const last=getLastEntry(ex.name);

  // Build top
  const top=document.createElement('div');
  top.className='ex-top';
  top.innerHTML=`
    <div class="ex-stripe" style="background:${d.color}"></div>
    <div class="ex-info">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta"><span class="xtag ${tagCls}">${ex.type}</span><span class="ex-scheme-tag">${ex.scheme}</span></div>
    </div>
    <div class="ex-primary"><div class="ex-primary-lbl">Principal</div><div class="ex-primary-val">${ex.primary}</div></div>
    <div class="ex-last">
      <div class="ex-last-lbl">Última sesión</div>
      <div class="${last?'ex-last-val':'ex-last-empty'}">${last?`${last.weight} · ${last.sets}`:'Sin datos'}</div>
    </div>
    <div class="ex-arrow">▼</div>`;
  top.addEventListener('click',()=>toggleCard(safeId(ex.name)));

  // Body
  const body=document.createElement('div');
  body.className='ex-body';
  const tracker=document.createElement('div');
  tracker.className='ex-tracker-section';

  // Sub-tab buttons
  const tabBar=document.createElement('div');tabBar.className='tracker-sub-tabs';
  const tabTech=document.createElement('button');tabTech.className='tsub active';tabTech.textContent='Técnica';tabTech.style.setProperty('--accent-col',d.color);
  const tabProg=document.createElement('button');tabProg.className='tsub';tabProg.textContent='Progresión';tabProg.style.setProperty('--accent-col',d.color);
  const tabAdd=document.createElement('button');tabAdd.className='tsub';tabAdd.textContent='➕ Registrar';tabAdd.style.setProperty('--accent-col',d.color);
  tabBar.append(tabTech,tabProg,tabAdd);

  // Técnica
  const cTech=document.createElement('div');cTech.className='tsub-content active';
  cTech.innerHTML=`<div class="ex-grid2"><div><div class="ex-block-label">Músculos</div><div class="chips">${chips}</div></div><div><div class="ex-block-label">Descanso</div><div class="ex-block-big">${ex.rest}</div></div></div><div class="ex-how"><div class="ex-block-label">Ejecución</div><p style="font-size:12px;color:var(--text2);line-height:1.65;margin-top:6px">${ex.how}</p></div><div class="ex-tip" style="border-left-color:${d.color}">💡 ${ex.tip}</div>`;

  // Progresión
  const cProg=document.createElement('div');cProg.className='tsub-content';
  const chartWrap=document.createElement('div');chartWrap.className='mini-chart-wrap';chartWrap.dataset.chartwrap='1';
  const histWrap=document.createElement('div');histWrap.dataset.histwrap='1';
  cProg.append(chartWrap,histWrap);

  // Registrar — pure DOM, no innerHTML with dynamic IDs
  const cAdd=document.createElement('div');cAdd.className='tsub-content';
  const form=document.createElement('div');form.className='add-form';

  function mkField(lbl,type,ph,fieldName,attrs){
    const wrap=document.createElement('div');
    const l=document.createElement('label');l.textContent=lbl;
    const inp=document.createElement('input');
    inp.type=type;inp.placeholder=ph;inp.dataset.field=fieldName;
    if(attrs) Object.assign(inp,attrs);
    if(type==='date') inp.value=new Date().toISOString().split('T')[0];
    wrap.append(l,inp);return wrap;
  }

  // Parse scheme hint e.g. "4 × 8–10"
  const sm=ex.scheme.match(/(\d+)\s*[xX×]\s*([\d–\-]+)/);
  const hSeries=sm?sm[1]:'';
  const hReps=sm?sm[2]:'';

  const fDate=mkField('Fecha','date','','date');
  const fSeries=mkField('Series','number',hSeries||'4','series',{min:1,max:20,step:1});
  const fReps=mkField('Reps realizadas','text',hReps||'8','reps');
  const fWeight=mkField('Peso (kg)','number','0','weight',{min:0,max:300,step:0.5});

  // Bodyweight checkbox
  const fBw=document.createElement('div');
  fBw.style.cssText='display:flex;align-items:flex-end;gap:8px;padding-bottom:1px;';
  const bwChk=document.createElement('input');bwChk.type='checkbox';bwChk.dataset.field='bw';
  bwChk.style.cssText='width:16px;height:16px;margin-bottom:9px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;';
  const bwLbl=document.createElement('label');
  bwLbl.textContent='Peso corporal';
  bwLbl.style.cssText='font-size:11px;text-transform:none;letter-spacing:0;color:var(--text2);cursor:pointer;margin-bottom:8px;';
  bwChk.addEventListener('change',()=>{
    const wi=form.querySelector('[data-field="weight"]');
    if(wi){wi.disabled=bwChk.checked;if(bwChk.checked)wi.value='';}
  });
  fBw.append(bwChk,bwLbl);

  const fNext=mkField('Siguiente objetivo','text','same / +2.5','next');
  const fNote=mkField('Nota técnica','text','Sensaciones...','note');
  fNote.style.gridColumn='1/-1';

  const actions=document.createElement('div');actions.className='form-actions';actions.style.gridColumn='1/-1';
  const btnSave=document.createElement('button');btnSave.className='btn btn-accent';btnSave.textContent='Guardar';
  const btnClear=document.createElement('button');btnClear.className='btn btn-ghost';btnClear.textContent='Limpiar';
  btnSave.addEventListener('click',()=>saveInlineEntry(card));
  btnClear.addEventListener('click',()=>clearInlineForm(form));
  actions.append(btnSave,btnClear);

  form.append(fDate,fSeries,fReps,fWeight,fBw,fNext,fNote,actions);
  cAdd.appendChild(form);

  // Wire sub-tabs
  [[tabTech,cTech],[tabProg,cProg],[tabAdd,cAdd]].forEach(([btn,content])=>{
    btn.addEventListener('click',()=>{
      [tabTech,tabProg,tabAdd].forEach(b=>b.classList.remove('active'));
      [cTech,cProg,cAdd].forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');content.classList.add('active');
      if(content===cProg) renderInlineProgress(safeId(ex.name),chartWrap,histWrap);
    });
  });

  tracker.append(tabBar,cTech,cProg,cAdd);
  body.appendChild(tracker);
  card.append(top,body);
  return card;
}
function safeId(name){return name.replace(/[^a-z0-9]/gi,'_');}

function toggleCard(sid){
  const card=document.getElementById('card-'+sid);
  if(!card)return;
  const wasOpen=card.classList.contains('open');
  card.closest('.panel')?.querySelectorAll('.ex-card').forEach(c=>c.classList.remove('open'));
  if(!wasOpen){
    card.classList.add('open');
    const chartWrap=card.querySelector('[data-chartwrap]');
    const histWrap=card.querySelector('[data-histwrap]');
    renderInlineProgress(sid,chartWrap,histWrap);
  }
}

// showSubTab replaced by event listeners in makeExCard

function renderInlineProgress(sid,chartWrap,histWrap){
  // chartWrap and histWrap can be passed directly (DOM refs) or resolved via card
  if(!chartWrap||!histWrap){
    const card=document.getElementById('card-'+sid);
    if(!card)return;
    chartWrap=card.querySelector('[data-chartwrap]');
    histWrap=card.querySelector('[data-histwrap]');
  }
  const exName=Object.values(DATA).flatMap(d=>d.groups.flatMap(g=>g.exercises)).find(e=>safeId(e.name)===sid)?.name;
  if(!exName)return;
  const entries=getEntries(exName);
  const histEl=histWrap;
  if(!histEl||!chartWrap)return;

  const wPoints=entries.map(e=>({date:fmtDate(e.date),val:parseKg(e.weight)})).filter(p=>p.val!==null);

  // Chart
  if(wPoints.length>=2){
    chartWrap.innerHTML='<canvas id="mc-'+sid+'"></canvas>';
    if(chartInstances[sid]){chartInstances[sid].destroy();}
    chartInstances[sid]=new Chart(document.getElementById('mc-'+sid).getContext('2d'),{
      type:'line',
      data:{labels:wPoints.map(p=>p.date),datasets:[{data:wPoints.map(p=>p.val),borderColor:'#c8f135',backgroundColor:'rgba(200,241,53,0.07)',pointBackgroundColor:'#c8f135',pointRadius:4,tension:0.35,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}},y:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'#2a2a2e'}}}}
    });
  } else {
    chartWrap.innerHTML=wPoints.length===1?'<div class="no-data-msg">Solo hay 1 registro — el gráfico aparece con 2 o más.</div>':'<div class="no-data-msg">Sin datos de peso todavía.</div>';
  }

  // History table
  if(!entries.length){histEl.innerHTML='<div class="no-data-msg">Ningún registro para este ejercicio aún. ¡Usa la pestaña ➕ Registrar!</div>';return;}
  const rows=[...entries].reverse().map((e,i,arr)=>{
    const prev=arr[i+1];const ck=parseKg(e.weight),pk=prev?parseKg(prev.weight):null;
    let delta='';
    if(ck!==null&&pk!==null){const dv=ck-pk;delta=dv>0?`<span class="delta-pos">+${dv.toFixed(1)}</span>`:dv<0?`<span class="delta-neg">${dv.toFixed(1)}</span>`:`<span class="delta-same">—</span>`;}
    return`<tr>
      <td>${fmtDate(e.date)}</td>
      <td>${e.sets}</td>
      <td>${e.weight}</td>
      <td>${delta}</td>
      <td style="color:var(--warn)">${e.next||'—'}</td>
      <td style="color:var(--text3);font-family:'DM Sans',sans-serif;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.note||''}</td>
      <td><button class="btn-danger-sm" onclick="deleteEntry('${e.id}','${sid}')">✕</button></td>
    </tr>`;
  }).join('');
  histEl.innerHTML=`<table class="hist-table"><thead><tr><th>Fecha</th><th>Series</th><th>Peso</th><th>Δ</th><th>Siguiente</th><th>Nota</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function saveInlineEntry(card){
  const exName=card.dataset.exname;
  const primary=card.dataset.primary;
  const day=card.dataset.day;
  const form=card.querySelector('.add-form');
  if(!form){console.error('No form found in card');return;}
  const get=f=>form.querySelector('[data-field="'+f+'"]');
  const date=get('date')?.value;
  if(!date){alert('Selecciona la fecha.');return;}
  const isBw=get('bw')?.checked;
  const series=get('series')?.value.trim()||'';
  const reps=get('reps')?.value.trim()||'';
  const sets=series&&reps?series+'x'+reps:series||reps;
  const weightRaw=get('weight')?.value.trim();
  const weight=isBw?'Bodyweight':(weightRaw?weightRaw+'kg':'');
  const entry={id:uid(),date,day,exercise:exName,primary,sets,weight,equipment:'Mancuernas',next:get('next')?.value.trim()||'',note:get('note')?.value.trim()||''};
  console.log('Saving entry:',entry);
  logData.push(entry);
  saveData();
  console.log('logData length after save:',logData.length,'localStorage:',localStorage.getItem(STORAGE_KEY)?.length);
  clearInlineForm(form);
  refreshCard(exName);
  const sid=safeId(exName);
  const chartWrap=card.querySelector('[data-chartwrap]');
  const histWrap=card.querySelector('[data-histwrap]');
  renderInlineProgress(sid,chartWrap,histWrap);
  renderLog();
  // switch to Progresión tab
  const tabs=card.querySelectorAll('.tsub');
  const contents=card.querySelectorAll('.tsub-content');
  tabs.forEach(b=>b.classList.remove('active'));
  contents.forEach(c=>c.classList.remove('active'));
  if(tabs[1])tabs[1].classList.add('active');
  if(contents[1])contents[1].classList.add('active');
  renderInlineProgress(sid,chartWrap,histWrap);
}

function clearInlineForm(form){
  form.querySelectorAll('input').forEach(inp=>{
    if(inp.type==='date') inp.value=new Date().toISOString().split('T')[0];
    else if(inp.type==='checkbox') inp.checked=false;
    else inp.value='';
    inp.disabled=false;
  });
}

function deleteEntry(id,sid){
  if(!confirm('¿Eliminar este registro?'))return;
  const entry=logData.find(e=>e.id===id);
  logData=logData.filter(e=>e.id!==id);
  saveData();renderLog();
  const card=document.getElementById('card-'+sid);
  const chartWrap=card?.querySelector('[data-chartwrap]');
  const histWrap=card?.querySelector('[data-histwrap]');
  renderInlineProgress(sid,chartWrap,histWrap);
  if(entry) refreshCard(entry.exercise);
}

function refreshCard(exName){
  // Update the "Última sesión" pill without full rebuild
  const last=getLastEntry(exName);
  const sid=safeId(exName);
  const card=document.getElementById('card-'+sid);
  if(!card)return;
  const lastValEl=card.querySelector('.ex-last-val,.ex-last-empty');
  if(!lastValEl)return;
  if(last){
    lastValEl.className='ex-last-val';
    lastValEl.textContent=`${last.weight} · ${last.sets}`;
  } else {
    lastValEl.className='ex-last-empty';
    lastValEl.textContent='Sin datos';
  }
}

function refreshAllCards(){
  Object.values(DATA).forEach(d=>d.groups.forEach(g=>g.exercises.forEach(ex=>refreshCard(ex.name))));
}

function buildOverview(){
  const panel=document.getElementById('panel-ov');
  function sec(title,el){const d=document.createElement('div');d.innerHTML=`<div class="ov-sec-title">${title}</div>`;d.appendChild(el);panel.appendChild(d);}
  const sg=document.createElement('div');sg.className='ov-grid';
  OVERVIEW.stats.forEach(s=>{sg.innerHTML+=`<div class="ov-stat"><div class="ov-num">${s.num}</div><div class="ov-label">${s.label}</div></div>`;});
  sec('Estadísticas del programa',sg);
  const mg=document.createElement('div');mg.className='muscle-map';
  OVERVIEW.muscles.forEach(m=>{
    const days=m.days.map(d=>`<span class="mm-day" style="background:${d.dim};color:${d.col}">${d.label}</span>`).join('');
    mg.innerHTML+=`<div class="mm-card"><div class="mm-title">${m.name}</div><div class="mm-days">${days}</div><div style="font-size:10px;color:var(--text3);margin-top:4px">${m.desc}</div></div>`;
  });
  sec('Cobertura muscular',mg);
  const pg=document.createElement('div');
  OVERVIEW.principles.forEach(p=>{pg.innerHTML+=`<div class="principle"><div class="p-icon">${p.icon}</div><div><div class="p-title">${p.title}</div><div class="p-desc">${p.desc}</div></div></div>`;});
  sec('Principios de hipertrofia',pg);
}

// ════════════════════════════════════════
// LOG VIEW
// ════════════════════════════════════════
function setDayFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('#day-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLog();
}
function setMuscleFilter(m,btn){
  activeMuscle=m;
  document.querySelectorAll('#muscle-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLog();
}

function renderLog(){
  const dates=[...new Set(logData.map(e=>e.date))];
  document.getElementById('l-sessions').textContent=dates.length;
  document.getElementById('l-total').textContent=logData.length;
  // build muscle filter buttons
  const muscles=[...new Set(logData.map(e=>e.primary).filter(Boolean))].sort();
  const mf=document.getElementById('muscle-filters');
  const curMuscle=activeMuscle;
  mf.innerHTML='<button class="filter-btn fall'+(curMuscle==='ALL'?' active':'')+'" onclick="setMuscleFilter(\'ALL\',this)">Todos los músculos</button>'
    +muscles.map(m=>`<button class="filter-btn fall${m===curMuscle?' active':''}" onclick="setMuscleFilter('${m.replace(/'/g,"\\'")}',this)">${m}</button>`).join('');

  let filtered=activeFilter==='ALL'?logData:logData.filter(e=>e.day===activeFilter);
  if(activeMuscle!=='ALL') filtered=filtered.filter(e=>e.primary===activeMuscle);
  const groups=groupByDate(filtered);
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const container=document.getElementById('log-container');
  if(!sorted.length){container.innerHTML='<div class="empty-state"><span>🏋️</span>Sin registros para este filtro.</div>';return;}
  container.innerHTML=sorted.map(date=>{
    const entries=groups[date],dl=entries[0]?.day||'';
    return`<div class="session-group">
      <div class="session-hdr">
        <div class="session-date-lbl">${fmtDate(date)}</div>
        <span class="day-badge badge-${dl}">DÍA ${dl}</span>
        <div class="s-divider"></div>
      </div>
      ${entries.map(e=>`<div class="log-row">
        <div><div class="lr-name">${e.exercise}</div><div class="lr-muscle">${e.primary||''}</div></div>
        <div class="lr-mono">${e.sets}</div>
        <div class="lr-mono">${e.weight}</div>
        <div class="lr-next">→ ${e.next||'—'}</div>
        <div class="lr-note" title="${e.note}">${e.note||''}</div>
        <button class="btn-danger-sm" onclick="deleteEntryLog('${e.id}')">✕</button>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function deleteEntryLog(id){
  if(!confirm('¿Eliminar este registro?'))return;
  const entry=logData.find(e=>e.id===id);
  logData=logData.filter(e=>e.id!==id);
  saveData();renderLog();
  if(entry){refreshCard(entry.exercise);renderInlineProgress(safeId(entry.exercise));}
}

function switchView(view,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(t=>t.classList.remove('active-routine','active-log'));
  document.getElementById('view-'+view).classList.add('active');
  btn.classList.add('active-'+view);
}
function showDay(key,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('sel-a','sel-b','sel-c','sel-d','sel-overview'));
  document.getElementById('panel-'+key).classList.add('active');
  const sc=key==='ov'?'sel-overview':(DATA[key]?DATA[key].selClass:'');
  if(sc&&btn)btn.classList.add(sc);
}
function selectDayTab(key){const btn=document.getElementById('dtab-'+key);if(btn)showDay(key,btn);}

['a','b','c','d'].forEach(buildDay);
buildOverview();
loadData();
